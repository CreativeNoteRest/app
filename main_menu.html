<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creative Note</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Design tokens ─────────────────────────────────────────────── */
    :root {
      --brand:          #DB6E2B;
      --brand-light:    #FAEADE;
      --brand-dark:     #B85A1E;
      --text:           #1A1A1A;
      --text-mid:       #5A5A5A;
      --text-light:     #9A9A9A;
      --surface:        #FAFAF8;
      --card:           #FFFFFF;
      --border:         #E8E4DF;
      --radius:         12px;
      --shadow:         0 2px 16px rgba(0,0,0,0.07);
      --shadow-sm:      0 1px 3px rgba(0,0,0,0.07);
      --danger:         #DC2626;
      --danger-light:   #FEF2F2;
      --danger-border:  #FECACA;
      --success:        #16A34A;
      --success-light:  #F0FDF4;
      --warn:           #F59E0B;
      --warn-light:     #FFFBEB;
      --warn-border:    #FDE68A;
      --suspended:      #F59E0B;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    .app-header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 20px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .header-series-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.15rem; color: var(--brand); letter-spacing: -0.01em;
    }
    .header-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--brand); opacity: 0.35; }
    .header-app-name { font-size: 1.0rem; font-weight: 700; color: var(--text-mid); letter-spacing: 0.04em; text-transform: uppercase; }
    .btn-icon {
      background: none; border: none; cursor: pointer;
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-mid); transition: background 0.15s;
    }
    .btn-icon:hover { background: var(--brand-light); color: var(--brand); }

    /* ── Main ───────────────────────────────────────────────────────── */
    .main {
      flex: 1; display: flex; flex-direction: column;
      padding: 28px 20px 32px;
      max-width: 480px; width: 100%; margin: 0 auto;
    }
    .greeting { margin-bottom: 28px; }
    .greeting-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-light); margin-bottom: 4px; }
    .greeting-title { font-family: 'DM Serif Display', serif; font-size: 1.9rem; line-height: 1.15; color: var(--text); letter-spacing: -0.02em; }
    .greeting-title em { color: var(--brand); font-style: italic; }

    /* ── Primary button ─────────────────────────────────────────────── */
    .action-primary {
      background: var(--brand); border-radius: var(--radius);
      padding: 16px 18px; margin-bottom: 10px;
      cursor: pointer; border: none; width: 100%; text-align: left;
      display: flex; align-items: center; justify-content: space-between; gap: 14px;
      box-shadow: 0 4px 20px rgba(219,110,43,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .action-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(219,110,43,0.38); }
    .action-primary:active { transform: translateY(0); }
    .action-primary-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: rgba(255,255,255,0.65); margin-bottom: 3px; }
    .action-primary-title { font-family: 'DM Serif Display', serif; font-size: 1.35rem; color: #fff; line-height: 1.1; }
    .action-primary-icon { width: 36px; height: 36px; background: rgba(255,255,255,0.18); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .action-primary-icon svg { width: 18px; height: 18px; fill: #fff; }

    /* ── Secondary buttons ──────────────────────────────────────────── */
    .action-secondary {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px;
      cursor: pointer; text-align: left; width: 100%;
      display: flex; align-items: center; gap: 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .action-secondary:hover { border-color: var(--brand); box-shadow: var(--shadow); }
    .action-secondary-icon { width: 30px; height: 30px; background: var(--brand-light); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .action-secondary-icon svg { width: 16px; height: 16px; fill: var(--brand); }
    .action-secondary-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-light); }
    .action-secondary-title { font-size: 0.95rem; font-weight: 600; color: var(--text); }
    .stub-badge { display: inline-block; font-size: 0.6rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; background: var(--brand-light); color: var(--brand); border-radius: 4px; padding: 2px 6px; margin-top: 2px; }

    /* ── Message banner ─────────────────────────────────────────────── */
    .msg-banner {
      display: none;                        /* hidden until messages load */
      background: var(--card);
      border: 1px solid var(--border);
      border-left-width: 4px;              /* coloured left indicator */
      border-left-color: var(--border);    /* default: neutral; overridden per message type */
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: default;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      transition: box-shadow 0.15s;
      min-height: 52px;
      display: none;                        /* overridden to flex by JS when messages exist */
      flex-direction: column;
      justify-content: center;             /* vertical centre */
    }
    .msg-banner.has-cta { cursor: pointer; }
    .msg-banner.has-cta:hover { box-shadow: var(--shadow); }
    .msg-banner.type-alert        { border-left-color: var(--danger); }
    .msg-banner.type-announcement { border-left-color: var(--brand); }
    .msg-banner.type-promo        { border-left-color: var(--success); }

    /* Fade container: two stacked text layers, only one visible at a time */
    .msg-text-wrap { position: relative; min-height: 1.4em; }
    .msg-text {
      font-size: 0.82rem;
      color: var(--text-mid);
      line-height: 1.5;
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }
    .msg-text.visible {
      opacity: 1;
      position: relative;
      pointer-events: auto;
    }

    /* Dots indicator — shown only when >1 message */
    .msg-dots {
      display: flex;
      gap: 5px;
      justify-content: flex-end;
      margin-top: 8px;
    }
    .msg-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.3s;
    }
    .msg-dot.active { background: var(--text-light); }

    /* ── Bridging overlay ───────────────────────────────────────────── */
    .bridge-overlay { display: none; position: fixed; inset: 0; background: var(--brand); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
    .bridge-overlay.active { display: flex; }
    .bridge-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .bridge-text { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: #fff; }
    .bridge-sub { font-size: 0.82rem; color: rgba(255,255,255,0.65); margin-top: -12px; }

    /* ══════════════════════════════════════════════════════════════════
       BOTTOM SHEET
    ══════════════════════════════════════════════════════════════════ */
    .sheet-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 200;
    }
    .sheet-backdrop.active { display: block; }

    .bottom-sheet {
      display: none; position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--card);
      border-radius: 20px 20px 0 0;
      z-index: 201; max-height: 85vh;
      flex-direction: column;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.15);
    }
    .bottom-sheet.active {
      display: flex;
      animation: slideUp 0.28s cubic-bezier(0.32,0.72,0,1);
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .sheet-handle-row { padding: 12px 0 4px; display: flex; justify-content: center; flex-shrink: 0; }
    .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; }

    .sheet-header {
      padding: 8px 20px 16px;
      display: flex; align-items: flex-start; justify-content: space-between;
      flex-shrink: 0; border-bottom: 1px solid var(--border);
    }
    .sheet-title { font-family: 'DM Serif Display', serif; font-size: 1.2rem; color: var(--text); }
    .sheet-subtitle { font-size: 0.75rem; color: var(--suspended); font-weight: 600; margin-top: 3px; }
    .sheet-close {
      background: none; border: none; cursor: pointer;
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-light); transition: background 0.15s; flex-shrink: 0;
    }
    .sheet-close:hover { background: var(--surface); }

    .sheet-body { flex: 1; overflow-y: auto; padding: 16px 20px 32px; -webkit-overflow-scrolling: touch; }

    /* Sheet states */
    .sheet-state { display: none; }
    .sheet-state.active { display: block; }

    .sheet-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 0; gap: 14px; }
    .sheet-spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.7s linear infinite; }
    .sheet-loading-text { font-size: 0.85rem; color: var(--text-light); }

    .sheet-error-box { background: var(--danger-light); border: 1px solid var(--danger-border); border-radius: 10px; padding: 14px 16px; font-size: 0.82rem; color: var(--danger); margin-bottom: 14px; }

    /* Student list */
    .student-list { display: flex; flex-direction: column; gap: 8px; }

    .student-item {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      cursor: pointer; display: flex; align-items: center; gap: 14px;
      transition: border-color 0.12s, background 0.12s;
      -webkit-tap-highlight-color: transparent;
      width: 100%; text-align: left;
    }
    .student-item:hover { border-color: var(--brand); background: var(--card); }
    .student-item:active { transform: scale(0.985); }
    .student-item.suspended { border-color: var(--suspended); background: #FFFBF0; }
    .student-item.suspended:hover { border-color: #D97706; }

    .student-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--brand-light);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif; font-size: 1rem; color: var(--brand);
      flex-shrink: 0;
    }
    .student-item.suspended .student-avatar { background: #FEF3C7; color: #D97706; }

    .student-info { flex: 1; min-width: 0; }
    .student-name { font-size: 0.95rem; font-weight: 600; color: var(--text); }
    .student-tag { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: #D97706; margin-top: 2px; }

    .student-chevron { color: var(--text-light); flex-shrink: 0; }
    .student-item:hover .student-chevron { color: var(--brand); }
    .student-item.suspended:hover .student-chevron { color: #D97706; }

    .empty-state { text-align: center; padding: 32px 0; color: var(--text-light); font-size: 0.88rem; line-height: 1.6; }
    .empty-state strong { display: block; font-size: 1rem; color: var(--text-mid); margin-bottom: 6px; }

    /* Book picker */
    .book-picker-hint { font-size: 0.78rem; color: var(--text-mid); margin-bottom: 14px; line-height: 1.5; }
    .book-list { display: flex; flex-direction: column; gap: 8px; }

    .book-item {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      cursor: pointer; display: flex; align-items: center; gap: 14px;
      transition: border-color 0.12s, background 0.12s;
      -webkit-tap-highlight-color: transparent;
      width: 100%; text-align: left;
    }
    .book-item:hover { border-color: var(--brand); background: var(--card); }
    .book-item:active { transform: scale(0.985); }

    .book-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--brand-light); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .book-icon svg { width: 20px; height: 20px; fill: var(--brand); }
    .book-name { font-size: 0.95rem; font-weight: 600; color: var(--text); }

    .sheet-back {
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      font-size: 0.82rem; font-weight: 600; color: var(--brand);
      margin-bottom: 16px; padding: 0;
    }
    .sheet-back svg { width: 16px; height: 16px; }

    /* Retry button inside sheet */
    .retry-btn {
      background: var(--brand); color: #fff; border: none; border-radius: 10px;
      padding: 12px 20px; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; width: 100%; margin-top: 8px;
    }
  </style>
</head>
<body>

  <!-- Bridging overlay -->
  <div class="bridge-overlay" id="bridge-overlay">
    <div class="bridge-spinner"></div>
    <div class="bridge-text">Starting lesson...</div>
    <div class="bridge-sub">Getting things ready</div>
  </div>

  <!-- Sheet backdrop -->
  <div class="sheet-backdrop" id="sheet-backdrop" onclick="closeSheet()"></div>

  <!-- Bottom sheet -->
  <div class="bottom-sheet" id="bottom-sheet" role="dialog" aria-modal="true" aria-label="Open Lesson">
    <div class="sheet-handle-row"><div class="sheet-handle"></div></div>

    <div class="sheet-header">
      <div>
        <div class="sheet-title" id="sheet-title">Select a Student</div>
        <div class="sheet-subtitle" id="sheet-subtitle"></div>
      </div>
      <button class="sheet-close" onclick="closeSheet()" aria-label="Close">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <div class="sheet-body">

      <!-- Loading -->
      <div class="sheet-state active" id="state-loading">
        <div class="sheet-loading">
          <div class="sheet-spinner"></div>
          <div class="sheet-loading-text">Loading students...</div>
        </div>
      </div>

      <!-- Error -->
      <div class="sheet-state" id="state-error">
        <div class="sheet-error-box" id="sheet-error-msg">Something went wrong. Please try again.</div>
        <button class="retry-btn" onclick="loadSheet()">Try again</button>
      </div>

      <!-- Student list -->
      <div class="sheet-state" id="state-students">
        <div class="student-list" id="student-list"></div>
      </div>

      <!-- Book picker -->
      <div class="sheet-state" id="state-books">
        <button class="sheet-back" onclick="showStudentState()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
          Back to students
        </button>
        <div class="book-picker-hint">This student doesn't have a lesson book assigned yet. Please choose one to continue.</div>
        <div class="book-list" id="book-list"></div>
      </div>

    </div>
  </div>

  <!-- Header -->
  <header class="app-header">
    <div class="header-brand">
      <img src="/assets/Rest_Logo.png" alt="Creative Note Rest" style="height:36px;width:auto;display:block;" />
      <span class="header-dot"></span>
      <span class="header-app-name" id="header-teacher-name">Teacher</span>
    </div>
    <div>
      <button class="btn-icon" aria-label="Account" onclick="goAccount()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main content -->
  <main class="main">

    <div class="greeting">
      <div class="greeting-label">Good to see you</div>
      <h1 class="greeting-title">Ready to teach<em>?</em></h1>
    </div>

    <button class="action-primary" onclick="openLesson()" aria-label="Open a lesson">
      <div>
        <div class="action-primary-label">Start your session</div>
        <div class="action-primary-title">Open Lesson</div>
      </div>
      <div class="action-primary-icon">
        <svg viewBox="0 0 24 24"><path d="M9 18V6l12-2v12M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0zm12-2a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/></svg>
      </div>
    </button>

    <button class="action-secondary" onclick="goHistory()">
      <div class="action-secondary-icon">
        <svg viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>
      </div>
      <div>
        <div class="action-secondary-label">View</div>
        <div class="action-secondary-title">Lesson History</div>
      </div>
    </button>

    <button class="action-secondary" onclick="goStudents()" style="margin-bottom:24px;">
      <div class="action-secondary-icon">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2M12 3a4 4 0 1 1 0 8 4 4 0 0 1 0-8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <div>
        <div class="action-secondary-label">Manage</div>
        <div class="action-secondary-title">Students</div>
      </div>
    </button>

    <!-- Message banner — hidden until platform_messages are fetched.
         Rendered as <a> when cta_url is present, <div> otherwise.
         JS sets the correct tag, type classes, and content. -->
    <div class="msg-banner" id="msg-banner" role="status" aria-live="polite">
      <div class="msg-text-wrap" id="msg-text-wrap"></div>
      <div class="msg-dots" id="msg-dots"></div>
    </div>

  </main>

  <script type="module">
    import { supabase, requireAuth, applyBranding } from '/assets/app.js';

    // ── Auth + branding ──────────────────────────────────────────────
    await requireAuth();
    applyBranding();

    // ── Series name in header ────────────────────────────────────────
    const seriesSlug = sessionStorage.getItem('series_slug') || 'wunderkeys';
    const nameMap = { wunderkeys: 'WunderKeys' };
    const seriesEl = document.getElementById('series-name');
    if (seriesEl && nameMap[seriesSlug]) seriesEl.textContent = nameMap[seriesSlug];

    // ── Teacher name — populate immediately from sessionStorage ─────
    const displayName = sessionStorage.getItem('teacher_display_name') || '';
    if (displayName) {
      const nameEl = document.getElementById('header-teacher-name');
      if (nameEl) nameEl.textContent = displayName;
    }

    // ── Session context ──────────────────────────────────────────────
    const TEACHER_ID = sessionStorage.getItem('teacher_id') || '';
    const SERIES_ID  = sessionStorage.getItem('series_id')  || '';

    // ── DB warm-up -- fire and forget ────────────────────────────────
    // Runs in parallel immediately on page load, before the teacher taps
    // anything. Warms the Supabase connection, pgBouncer pool, and
    // Postgres buffer cache for the tables that drive Open Lesson and
    // Manage Students. No await -- never blocks page render.
    if (TEACHER_ID && SERIES_ID) {
      Promise.all([
        supabase.from('config').select('config_key').eq('series_id', SERIES_ID).limit(1),
        supabase.from('students').select('student_id').eq('teacher_id', TEACHER_ID).eq('student_status', 'active').limit(1),
        supabase.from('sessions').select('session_id').eq('teacher_id', TEACHER_ID).limit(1),
        supabase.from('books').select('book_id').eq('series_id', SERIES_ID).eq('is_active', true).limit(1)
      ]).catch(() => {}); // silently swallow any error -- warm-up is non-critical
    }

    // ── UUID generator ───────────────────────────────────────────────
    function genUUID() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
    }

    // ── Today's date in teacher timezone ─────────────────────────────
    let teacherTimezone = sessionStorage.getItem('teacher_timezone') || 'America/Toronto';

    function todayDate() {
      return new Intl.DateTimeFormat('en-CA', {
        timeZone: teacherTimezone
      }).format(new Date()); // YYYY-MM-DD
    }

    // ── Working state ────────────────────────────────────────────────
    let students        = [];    // enriched student list
    let selectedStudent = null;  // student chosen by teacher

    // ── Sheet UI helpers ─────────────────────────────────────────────
    function showState(id) {
      document.querySelectorAll('.sheet-state')
        .forEach(el => el.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function setHeader(title, subtitle = '') {
      document.getElementById('sheet-title').textContent = title;
      document.getElementById('sheet-subtitle').textContent = subtitle;
    }

    function showError(msg) {
      document.getElementById('sheet-error-msg').textContent = msg;
      showState('state-error');
    }

    // ── Open / close ─────────────────────────────────────────────────
    window.openLesson = function() {
      document.getElementById('sheet-backdrop').classList.add('active');
      document.getElementById('bottom-sheet').classList.add('active');
      setHeader('Select a Student');
      loadSheet();
    };

    window.closeSheet = function() {
      document.getElementById('sheet-backdrop').classList.remove('active');
      document.getElementById('bottom-sheet').classList.remove('active');
      selectedStudent = null;
    };

    // ── Load: orphan fix then student list ───────────────────────────
    async function loadSheet() {
      showState('state-loading');
      try {
        await fixOrphans();
        await loadStudents();
      } catch (err) {
        console.error('Sheet load error:', err);
        showError('Could not load students. Please check your connection and try again.');
      }
    }
    window.loadSheet = loadSheet;

    // ── Step 1: Fix orphans silently ─────────────────────────────────
    // An orphan is an active Sessions row for this teacher with no
    // corresponding Active_Sessions row. We write the missing row so
    // the student appears as suspended in the list.
    async function fixOrphans() {
      const today = todayDate();

      // Find any active sessions for this teacher today
      const { data: activeSessions, error: sessErr } = await supabase
        .from('sessions')
        .select('session_id, student_id, series_id')
        .eq('teacher_id', TEACHER_ID)
        .eq('session_status', 'active')
        .eq('session_date', today);

      if (sessErr || !activeSessions || activeSessions.length === 0) return;

      // Check what Active_Sessions row exists for this teacher
      const { data: activeRow } = await supabase
        .from('active_sessions')
        .select('session_id')
        .eq('teacher_id', TEACHER_ID)
        .maybeSingle();

      const activeSessionId = activeRow?.session_id;

      for (const s of activeSessions) {
        if (s.session_id !== activeSessionId) {
          // Orphan -- write missing Active_Sessions row
          const { error: upsertErr } = await supabase
            .from('active_sessions')
            .upsert({
              teacher_id: TEACHER_ID,
              session_id: s.session_id,
              student_id: s.student_id,
              series_id:  s.series_id || SERIES_ID
            }, { onConflict: 'teacher_id' });

          if (upsertErr) {
            // Non-blocking -- log and continue
            console.warn('Orphan fix failed for session', s.session_id, upsertErr.message);
          }
        }
      }
    }

    // ── Step 2: Load students ────────────────────────────────────────
    async function loadStudents() {

      // Load teacher timezone (non-blocking -- use default if fails)
      const { data: tData } = await supabase
        .from('teachers')
        .select('timezone')
        .eq('teacher_id', TEACHER_ID)
        .maybeSingle();

      if (tData?.timezone) teacherTimezone = tData.timezone;

      // Fetch active students for this teacher
      const { data: rawStudents, error: stuErr } = await supabase
        .from('students')
        .select('student_id, safe_name, current_book')
        .eq('teacher_id', TEACHER_ID)
        .eq('student_status', 'active')
        .order('safe_name', { ascending: true });

      if (stuErr) throw new Error(stuErr.message);

      if (!rawStudents || rawStudents.length === 0) {
        students = [];
        renderStudents();
        return;
      }

      // Get suspended student_id from Active_Sessions (one row per teacher)
      const { data: activeRow } = await supabase
        .from('active_sessions')
        .select('student_id')
        .eq('teacher_id', TEACHER_ID)
        .maybeSingle();

      const suspendedStudentId = activeRow?.student_id || null;

      // Mark suspended student and sort to top
      students = rawStudents.map(s => ({
        ...s,
        suspended: s.student_id === suspendedStudentId
      }));

      students.sort((a, b) => {
        if (a.suspended && !b.suspended) return -1;
        if (!a.suspended && b.suspended) return 1;
        return a.safe_name.localeCompare(b.safe_name);
      });

      renderStudents();
    }

    // ── Render student list ──────────────────────────────────────────
    function renderStudents() {
      const suspendedCount = students.filter(s => s.suspended).length;

      setHeader(
        'Select a Student',
        suspendedCount > 0
          ? `${suspendedCount} session${suspendedCount > 1 ? 's' : ''} in progress`
          : ''
      );

      const list = document.getElementById('student-list');
      list.innerHTML = '';

      if (students.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <strong>No active students</strong>
            Add students in the Students section before starting a lesson.
          </div>`;
        showState('state-students');
        return;
      }

      students.forEach(s => {
        const initial = s.safe_name.charAt(0).toUpperCase();
        const btn = document.createElement('button');
        btn.className = `student-item${s.suspended ? ' suspended' : ''}`;
        btn.innerHTML = `
          <div class="student-avatar">${initial}</div>
          <div class="student-info">
            <div class="student-name">${s.safe_name}</div>
            ${s.suspended ? '<div class="student-tag">Session in progress</div>' : ''}
          </div>
          <svg class="student-chevron" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        `;
        btn.addEventListener('click', () => onStudentSelected(s));
        list.appendChild(btn);
      });

      showState('state-students');
    }

    window.showStudentState = function() {
      renderStudents();
    };

    // ── Student selected ─────────────────────────────────────────────
    async function onStudentSelected(student) {
      selectedStudent = student;

      // Always check book -- even on resume, book may be null if
      // the previous session was interrupted before book selection
      if (!student.current_book) {
        await showBookPicker(student);
      } else {
        await openSession(student, student.current_book, false);
      }
    }

    // ── Book picker ──────────────────────────────────────────────────
    async function showBookPicker(student) {
      showState('state-loading');
      setHeader(`${student.safe_name}`, 'Choose a lesson book');

      const { data: books, error: bookErr } = await supabase
        .from('books')
        .select('book_id, full_display_name, edition')
        .eq('series_id', SERIES_ID)
        .eq('is_active', true)
        .order('sequence_number', { ascending: true });

      if (bookErr) {
        showError('Could not load books. Please try again.');
        return;
      }

      const list = document.getElementById('book-list');
      list.innerHTML = '';

      if (!books || books.length === 0) {
        list.innerHTML = `<div class="empty-state"><strong>No books available</strong>Contact your series administrator.</div>`;
      } else {
        books.forEach(b => {
          const btn = document.createElement('button');
          btn.className = 'book-item';
          btn.innerHTML = `
            <div class="book-icon">
              <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20V2H6.5A2.5 2.5 0 0 0 4 4.5v15z"/></svg>
            </div>
            <div>
              <div class="book-name">${b.full_display_name}</div>
            </div>
          `;
          btn.addEventListener('click', () => openSession(selectedStudent, b.book_id, true));
          list.appendChild(btn);
        });
      }

      showState('state-books');
    }

    // ── Open session ─────────────────────────────────────────────────
    async function openSession(student, bookId, bookJustSelected) {
      showState('state-loading');
      setHeader('Opening lesson...');

      try {
        const today = todayDate();
        let sessionId;

        if (student.suspended) {
          // ── Resume path ──────────────────────────────────────────
          // Active_Sessions row already exists -- just get session_id
          const { data: activeRow, error: activeErr } = await supabase
            .from('active_sessions')
            .select('session_id')
            .eq('teacher_id', TEACHER_ID)
            .maybeSingle();

          if (activeErr || !activeRow) throw new Error('Could not find active session to resume.');
          sessionId = activeRow.session_id;

          // If book was just selected, patch Sessions.lesson_book_id (non-blocking)
          if (bookJustSelected && bookId) {
            supabase
              .from('sessions')
              .update({ lesson_book_id: bookId })
              .eq('session_id', sessionId)
              .then(({ error }) => {
                if (error) console.warn('lesson_book_id update failed (non-blocking):', error.message);
              });

            // Also write to Students.current_book (non-blocking)
            supabase
              .from('students')
              .update({ current_book: bookId })
              .eq('student_id', student.student_id)
              .then(({ error }) => {
                if (error) console.warn('current_book update failed (non-blocking):', error.message);
              });
          }

        } else {
          // ── New session path ─────────────────────────────────────
          sessionId = genUUID();

          // Write Sessions record
          const { error: sessErr } = await supabase
            .from('sessions')
            .insert({
              session_id:     sessionId,
              series_id:      SERIES_ID,
              teacher_id:     TEACHER_ID,
              student_id:     student.student_id,
              session_date:   today,
              session_type:   'lesson',
              session_status: 'active',
              lesson_book_id: bookId || null
            });

          if (sessErr) throw new Error(`Session write failed: ${sessErr.message}`);

          // Write Active_Sessions row
          const { error: activeErr } = await supabase
            .from('active_sessions')
            .upsert({
              teacher_id: TEACHER_ID,
              session_id: sessionId,
              student_id: student.student_id,
              series_id:  SERIES_ID
            }, { onConflict: 'teacher_id' });

          if (activeErr) throw new Error(`Active session write failed: ${activeErr.message}`);

          // If book was just selected, also update Students.current_book (non-blocking)
          if (bookJustSelected && bookId) {
            supabase
              .from('students')
              .update({ current_book: bookId })
              .eq('student_id', student.student_id)
              .then(({ error }) => {
                if (error) console.warn('current_book update failed (non-blocking):', error.message);
              });
          }
        }

        // Store session context for session_entry.html
        sessionStorage.setItem('session_id',   sessionId);
        sessionStorage.setItem('student_id',   student.student_id);
        sessionStorage.setItem('student_name', student.safe_name);
        sessionStorage.setItem('lesson_book_id', bookId || '');

        // Show bridging overlay then navigate
        closeSheet();
        document.getElementById('bridge-overlay').classList.add('active');
        setTimeout(() => { window.location.href = '/session_entry.html'; }, 600);

      } catch (err) {
        console.error('Session open error:', err);
        showError(`Could not open session: ${err.message}`);
      }
    }

    // ── Stub navigation ──────────────────────────────────────────────
    window.goStudents = () => { window.location.href = '/manage_students.html'; };
    window.goHistory  = () => { window.location.href = '/session_history.html'; };
    window.goAccount  = () => { window.location.href = '/account.html'; };

    // ── Platform message banner ──────────────────────────────────────
    // Reads from active_platform_messages view — a join of
    // platform_messages + message_control. The view applies is_active
    // and date window filters. A single fetch returns all candidate
    // rows; client-side filtering then applies series scope, teacher
    // targeting, and display_condition evaluation.
    //
    // display_condition keys map to JS functions evaluated against the
    // teacher's current context (from sessionStorage). Campaign rows
    // use 'campaign' which always passes — cohort was defined at
    // injection time. message_text supports inline HTML and {{tokens}};
    // token resolution is a future step (wdn-095). Safe to render with
    // innerHTML — platform-authored content only, never user input.
    // Banner is hidden entirely when no qualifying messages remain.

    (async function initMessageBanner() {
      if (!TEACHER_ID || !SERIES_ID) return;

      // ── Condition registry ───────────────────────────────────────
      // Add new conditions here as standing message types are defined.
      // ctx values come from sessionStorage; extend as richer
      // subscription context becomes available (Tier B).
      const CONDITIONS = {
        always:          ()    => true,
        campaign:        ()    => true,
        trial_ending:    (ctx) => typeof ctx.trialDaysRemaining === 'number' && ctx.trialDaysRemaining <= 3,
        account_overdue: (ctx) => typeof ctx.daysOverdue        === 'number' && ctx.daysOverdue > 0,
        seats_warning:   (ctx) => typeof ctx.seatsRemaining     === 'number' && ctx.seatsRemaining <= 2,
      };

      // ── Teacher context for condition evaluation ─────────────────
      // Extend when sessionStorage keys are populated upstream.
      const ctx = {
        trialDaysRemaining: parseFloat(sessionStorage.getItem('trial_days_remaining') ?? 'NaN'),
        daysOverdue:        parseFloat(sessionStorage.getItem('days_overdue')          ?? 'NaN'),
        seatsRemaining:     parseFloat(sessionStorage.getItem('seats_remaining')       ?? 'NaN'),
      };

      try {
        const cols = 'message_id, message_type, display_condition, message_text, cta_url, cta_new_tab, priority, teacher_id, series_id';

        const { data: rows, error } = await supabase
          .from('active_platform_messages')
          .select(cols);

        if (error) { console.warn('active_platform_messages fetch failed:', error.message); return; }
        if (!rows || rows.length === 0) return;

        // ── Filter: series scope + teacher targeting + condition ───
        const qualifying = rows
          .filter(m => {
            // Series scope: match this series or platform-wide (null)
            if (m.series_id && m.series_id !== SERIES_ID) return false;
            // Targeting: broadcast (teacher_id null) or this teacher
            if (m.teacher_id && m.teacher_id !== TEACHER_ID) return false;
            // Condition evaluation
            const fn = CONDITIONS[m.display_condition] ?? CONDITIONS.always;
            return fn(ctx);
          })
          .sort((a, b) => a.priority - b.priority);

        if (qualifying.length === 0) return;

        // ── Border colour lookup by message_type ─────────────────
        const typeClass = {
          alert:        'type-alert',
          announcement: 'type-announcement',
          promo:        'type-promo'
        };

        // ── Build banner ─────────────────────────────────────────
        const banner   = document.getElementById('msg-banner');
        const textWrap = document.getElementById('msg-text-wrap');
        const dotsEl   = document.getElementById('msg-dots');

        let currentIdx = 0;

        function applyMessage(idx) {
          const msg = qualifying[idx];

          // Swap type class
          banner.classList.remove('type-alert', 'type-announcement', 'type-promo');
          if (typeClass[msg.message_type]) banner.classList.add(typeClass[msg.message_type]);

          // CTA behaviour — make banner tappable if cta_url present
          if (msg.cta_url) {
            banner.classList.add('has-cta');
            banner.style.cursor = 'pointer';
            banner.onclick = () => {
              if (msg.cta_new_tab) {
                window.open(msg.cta_url, '_blank');
              } else {
                window.location.href = msg.cta_url;
              }
            };
          } else {
            banner.classList.remove('has-cta');
            banner.style.cursor = 'default';
            banner.onclick = null;
          }

          // Update dots
          dotsEl.querySelectorAll('.msg-dot').forEach((d, i) => {
            d.classList.toggle('active', i === idx);
          });
        }

        function showMessage(idx, animate) {
          if (!animate) {
            // First render — no fade, just show
            textWrap.innerHTML = '';
            const el = document.createElement('div');
            el.className = 'msg-text visible';
            el.innerHTML = qualifying[idx].message_text;
            textWrap.appendChild(el);
            applyMessage(idx);
            return;
          }

          // Fade: fade out current, swap content, fade in
          const current = textWrap.querySelector('.msg-text.visible');
          if (current) {
            current.classList.remove('visible'); // triggers CSS opacity 0 transition
            setTimeout(() => {
              textWrap.innerHTML = '';
              const el = document.createElement('div');
              el.className = 'msg-text visible';
              el.innerHTML = qualifying[idx].message_text;
              textWrap.appendChild(el);
              applyMessage(idx);
            }, 520); // slightly past the 0.5s CSS transition
          } else {
            showMessage(idx, false);
          }
        }

        // Build dot indicators (only shown when >1 message)
        if (qualifying.length > 1) {
          qualifying.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'msg-dot' + (i === 0 ? ' active' : '');
            dotsEl.appendChild(dot);
          });
        }

        // Initial render
        showMessage(0, false);
        banner.style.display = 'flex';

        // Cycle if multiple messages (8 second interval)
        if (qualifying.length > 1) {
          setInterval(() => {
            currentIdx = (currentIdx + 1) % qualifying.length;
            showMessage(currentIdx, true);
          }, 8000);
        }

      } catch (err) {
        console.warn('initMessageBanner error:', err.message);
      }

    })(); // end initMessageBanner

  </script>

</body>
