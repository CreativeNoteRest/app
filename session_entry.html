<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Lesson Entry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:          #DB6E2B;
      --brand-light:    #FAEADE;
      --brand-dark:     #B85A1E;
      --surface:        #FAFAF8;
      --card:           #FFFFFF;
      --border:         #E8E4DF;
      --text:           #1A1A1A;
      --text-mid:       #5A5A5A;
      --text-light:     #9A9A9A;
      --danger:         #DC2626;
      --danger-light:   #FEF2F2;
      --success:        #16A34A;
      --success-light:  #F0FDF4;
      --radius:         12px;
      --shadow:         0 2px 16px rgba(0,0,0,0.07);
      --shadow-sm:      0 1px 3px rgba(0,0,0,0.07);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout shell ─────────────────────────────────────────── */
    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100dvh; /* dynamic viewport height -- keyboard-aware */
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── Header ───────────────────────────────────────────────── */
    .page-header {
      flex-shrink: 0;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px 12px;
      box-shadow: var(--shadow-sm);
    }

    .header-series {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      letter-spacing: -0.01em;
      color: var(--brand);
      margin-bottom: 4px;
    }

    .header-student {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--text);
      line-height: 1.2;
    }

    .header-meta {
      font-size: 13px;
      color: var(--text-mid);
      margin-top: 3px;
    }

    /* ── Entry log ────────────────────────────────────────────── */
    .entry-log {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }

    .entry-log:empty::after {
      content: 'Notes will appear here as you type them.';
      display: block;
      text-align: center;
      color: var(--text-light);
      font-size: 14px;
      margin-top: 40px;
    }

    .entry-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      box-shadow: var(--shadow-sm);
      animation: slideIn 0.18s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .entry-timestamp {
      font-size: 11px;
      color: var(--text-light);
      margin-bottom: 4px;
      font-weight: 500;
    }

    .entry-text {
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
    }

    .entry-item {
      cursor: pointer;
      user-select: none;
    }

    .entry-item:active {
      opacity: 0.75;
    }

    .entry-ignored {
      background: #F2F2F0;
      border-color: #D8D4CF;
      opacity: 0.6;
    }

    .entry-ignored .entry-text {
      text-decoration: line-through;
      color: var(--text-light);
    }

    .entry-ignored .entry-timestamp {
      color: #C0BAB4;
    }

    /* ── Inline edit state ────────────────────────────────────── */
    .entry-item.editing {
      background: #FFFDF9;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(219,110,43,0.12);
    }

    .entry-edit-textarea {
      width: 100%;
      min-height: 48px;
      padding: 2px 0;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      resize: none;
      overflow: hidden;
    }

    /* ── Entry counter ────────────────────────────────────────── */
    .entry-counter {
      flex-shrink: 0;
      text-align: center;
      padding: 6px;
      font-size: 12px;
      color: var(--text-light);
      font-weight: 500;
    }

    .entry-counter span {
      font-weight: 600;
    }

    /* ── Input area ───────────────────────────────────────────── */
    .input-area {
      flex-shrink: 0;
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 12px 16px 16px;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.04);
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .entry-textarea {
      flex: 1;
      min-height: 48px;
      max-height: 120px;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      background: var(--surface);
      resize: none;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }

    .entry-textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(219,110,43,0.12);
      background: #fff;
    }

    .entry-textarea::placeholder {
      color: var(--text-light);
    }

    /* Mic button */
    .btn-mic {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-mid);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-mic:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-light); }
    .btn-mic.listening {
      border-color: var(--danger);
      background: var(--danger-light);
      color: var(--danger);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.25); }
      50%       { box-shadow: 0 0 0 6px rgba(192,57,43,0); }
    }

    .btn-mic svg { width: 20px; height: 20px; }

    /* Submit button */
    .btn-submit {
      height: 48px;
      padding: 0 20px;
      border-radius: var(--radius);
      border: none;
      background: var(--brand);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-submit:hover  { background: var(--brand-dark); }
    .btn-submit:active { transform: scale(0.97); }
    .btn-submit:disabled {
      background: var(--border);
      color: var(--text-light);
      cursor: not-allowed;
      transform: none;
    }

    /* ── Status / error messages ──────────────────────────────── */
    .status-bar {
      flex-shrink: 0;
      padding: 0 16px;
    }

    .status-msg {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .status-msg.show { display: flex; }
    .status-msg.error   { background: var(--danger-light); color: var(--danger); }
    .status-msg.success { background: var(--success-light); color: var(--success); }

    /* ── Close lesson button ──────────────────────────────────── */
    .footer-bar {
      flex-shrink: 0;
      padding: 0 16px 12px;
      display: flex;
      justify-content: flex-end;
    }

    .btn-close-lesson {
      padding: 10px 18px;
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-mid);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-close-lesson:hover {
      border-color: var(--text-mid);
      color: var(--text);
    }

    /* ── Auth guard overlay ───────────────────────────────────── */
    #auth-loading {
      position: fixed; inset: 0;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Book display + change modal ─────────────────────────────── */
    .hdr-book {
      font-size: 12px;
      color: var(--text);
      font-weight: 600;
      margin-top: 4px;
    }

    .book-change-link {
      color: var(--brand);
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      margin-left: 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .book-modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 200;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    .book-modal {
      background: var(--card);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 28px 24px 32px;
      width: 100%; max-width: 680px;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.15);
    }

    .book-modal-heading {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem; color: var(--text);
      letter-spacing: -0.01em; margin-bottom: 10px;
    }

    .book-modal-body {
      font-size: 0.88rem; color: var(--text-mid);
      line-height: 1.6; margin-bottom: 16px;
    }

    .book-modal-select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      background: var(--surface);
      margin-bottom: 20px;
      outline: none;
    }

    .book-modal-select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(219,110,43,0.12);
    }

    .book-modal-actions { display: flex; gap: 10px; }

    .btn-book-confirm {
      flex: 2; height: 50px;
      background: var(--brand); color: #fff;
      border: none; border-radius: var(--radius);
      font-family: 'DM Serif Display', serif;
      font-size: 1.05rem; cursor: pointer;
      box-shadow: 0 4px 16px rgba(219,110,43,0.28);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }

    .btn-book-confirm:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(219,110,43,0.36); }
    .btn-book-confirm:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-book-cancel {
      flex: 1; height: 50px;
      background: var(--card); color: var(--text-mid);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-book-cancel:hover { border-color: var(--text-mid); color: var(--text); }

    .book-modal-error {
      font-size: 0.82rem; color: var(--danger);
      margin-top: 12px; display: none; line-height: 1.5;
    }

    /* ── Header flex layout (text + history button) ──────────────── */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .header-text {
      flex: 1;
      min-width: 0;
    }

    /* ── History button ───────────────────────────────────────────── */
    .btn-history {
      flex-shrink: 0;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-mid);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      margin-top: 2px;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-history:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-light); }

    /* ── History modal ────────────────────────────────────────────── */
    .history-modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 200;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    .history-modal {
      background: var(--card);
      border-radius: var(--radius) var(--radius) 0 0;
      width: 100%; max-width: 680px;
      max-height: 82vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.15);
    }

    .history-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 12px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .history-modal-heading {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      color: var(--text);
    }

    .btn-history-close {
      width: 32px; height: 32px;
      border: none; background: none;
      color: var(--text-light);
      font-size: 16px; cursor: pointer;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, color 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-history-close:hover { background: var(--border); color: var(--text); }

    #history-modal-body {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 24px 28px;
      flex: 1;
    }

    .history-date-select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      background: var(--surface);
      margin-bottom: 16px;
      outline: none;
    }

    .history-date-select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(219,110,43,0.12);
    }

    .history-content-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .history-content-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--brand);
      margin-bottom: 8px;
    }

    .history-content-body {
      font-size: 14px;
      color: var(--text);
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .history-content-body a {
      color: var(--brand);
      text-decoration: underline;
      word-break: break-all;
    }

    .history-content-empty {
      font-size: 14px;
      color: var(--text-light);
      font-style: italic;
    }

    .history-empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-light);
      font-size: 14px;
    }

    /* ── Supplement tiles inside history modal ────────────────────── */
    .history-supp-list { display: flex; flex-direction: column; gap: 8px; margin-top: 2px; }
    .history-supp-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .history-supp-thumb {
      width: 44px; height: 56px; border-radius: 0;
      object-fit: cover; flex-shrink: 0;
      background: var(--brand-light);
      cursor: pointer; transition: opacity 0.15s;
    }
    .history-supp-thumb:hover { opacity: 0.82; }
    .history-supp-thumb-placeholder {
      width: 44px; height: 56px; border-radius: 0;
      background: var(--brand-light);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .history-supp-thumb-placeholder svg { width: 20px; height: 20px; fill: var(--brand); opacity: 0.6; }
    .history-supp-info { flex: 1; min-width: 0; }
    .history-supp-title {
      font-size: 0.88rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .history-supp-meta {
      font-size: 0.72rem; color: var(--text-light); margin-top: 2px;
      display: flex; align-items: center; gap: 6px;
    }
    .history-badge-free {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase;
      background: var(--success-light); color: var(--success);
      border-radius: 4px; padding: 1px 5px;
    }
    .history-badge-paid {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase;
      background: var(--brand-light); color: var(--brand);
      border-radius: 4px; padding: 1px 5px;
    }
    .history-supp-link {
      flex-shrink: 0;
      width: 32px; height: 32px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--card);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-light); text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .history-supp-link:hover { border-color: var(--brand); color: var(--brand); }
    .history-supp-link svg { width: 14px; height: 14px; }
    .history-active-supp-label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--brand);
      margin-top: 18px; margin-bottom: 10px;
    }

    .history-loading {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-light);
      font-size: 14px;
    }

    .hidden { display: none !important; }

    /* ── Assign button (matches btn-history style) ────────────────── */
    .btn-assign {
      flex-shrink: 0;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-mid);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      margin-top: 2px;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-assign:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-light); }

    /* ── Active assignment strip ──────────────────────────────────── */
    .assign-list-frame {
      flex-shrink: 0;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
    }

    .assign-list-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--brand);
      margin-bottom: 6px;
    }

    .assign-list-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }

    .assign-list-item:last-child { border-bottom: none; }

    .assign-thumb {
      width: 28px;
      height: 36px;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: var(--text-light);
      cursor: pointer;
    }

    .assign-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .assign-thumb.has-url { cursor: pointer; }
    .assign-thumb.has-url:hover { opacity: 0.82; }

    .assign-item-title {
      flex: 1;
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-assign-remove {
      flex-shrink: 0;
      padding: 3px 10px;
      border-radius: 5px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-light);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-assign-remove:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Assign supplement modal ──────────────────────────────────── */
    .assign-modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 200;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    .assign-modal {
      background: var(--card);
      border-radius: var(--radius) var(--radius) 0 0;
      width: 100%; max-width: 680px;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.15);
    }

    .assign-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 12px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .assign-modal-heading {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      color: var(--text);
    }

    .btn-assign-modal-close {
      width: 32px; height: 32px;

<script type="module">
  import { supabase, requireAuth, applyBranding, showError, clearError } from '/assets/app.js';

  // 1. Auth guard
  await requireAuth();

  // 2. Session context from sessionStorage
  const teacherId   = sessionStorage.getItem('teacher_id');
  const sessionId   = sessionStorage.getItem('session_id');
  const studentId   = sessionStorage.getItem('student_id');
  const studentName = sessionStorage.getItem('student_name');
  const seriesId    = sessionStorage.getItem('series_id');

  if (!teacherId || !sessionId || !studentId) {
    window.location.href = '/main_menu.html';
  }

  // 3. Branding + header
  applyBranding();

  const today = new Date().toLocaleDateString('en-CA', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  document.getElementById('hdr-student').textContent = studentName || 'Student';
  document.getElementById('hdr-meta').textContent    = today;

  const nameMap = { wunderkeys: 'Creative Note REST' };
  const seriesSlug = sessionStorage.getItem('series_slug') || '';
  const seriesEl = document.getElementById('hdr-series');
  seriesEl.textContent = nameMap[seriesSlug] || 'Creative Note REST';

  document.getElementById('auth-loading').style.display = 'none';
  document.getElementById('app-shell').style.display    = 'flex';

  // 4. Teacher timezone -- fetched once, used to calculate purge_after on every insert
  let teacherTimezone = 'America/Toronto';

  try {
    const { data: tzData, error: tzError } = await supabase
      .from('teachers')
      .select('timezone')
      .eq('teacher_id', teacherId)
      .single();

    if (!tzError && tzData && tzData.timezone) {
      teacherTimezone = tzData.timezone;
    }
  } catch (e) {
    console.warn('Could not fetch teacher timezone, using fallback:', e);
  }

  function calcPurgeAfter() {
    // Build "tonight at 02:00" in the teacher's IANA timezone, return as UTC ISO string.
    // Strategy: find today's date in teacher timezone, construct 02:00 local,
    // then calculate the UTC equivalent by comparing two Date objects.
    const now = new Date();

    // Get today's date components in the teacher's timezone
    const parts = new Intl.DateTimeFormat('en-CA', {
      timeZone: teacherTimezone,
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    }).formatToParts(now);

    const y = parts.find(p => p.type === 'year').value;
    const m = parts.find(p => p.type === 'month').value;
    const d = parts.find(p => p.type === 'day').value;

    // Build a UTC Date that represents midnight in the teacher's timezone today,
    // by finding the difference between local midnight (UTC) and teacher midnight.
    // Simpler approach: use the timezone-aware formatter to find what UTC time
    // corresponds to 02:00 in the teacher's timezone today.

    // Format a reference point: what does 02:00 UTC look like in teacher timezone?
    // We iterate: start from today's date at 02:00 UTC and adjust.
    // Cleanest reliable approach: construct the date string and use Intl to resolve it.

    // Build candidate: today at 02:00 in teacher local time
    // We express this as a UTC timestamp by computing the offset directly.
    // Offset = UTC_time - local_time for the same instant.
    const localMidnightUTC = Date.UTC(
      parseInt(y), parseInt(m) - 1, parseInt(d), 0, 0, 0
    );

    // Find what UTC hour corresponds to 02:00 in teacher timezone on this date.
    // We do this by checking each UTC hour until the teacher-local hour equals 2.
    let target = null;
    for (let h = 0; h < 30; h++) {
      const candidate = new Date(localMidnightUTC + h * 3600000);
      const localHour = parseInt(
        new Intl.DateTimeFormat('en-CA', {
          timeZone: teacherTimezone,
          hour: '2-digit', minute: '2-digit', hour12: false
        }).formatToParts(candidate).find(p => p.type === 'hour').value
      );
      if (localHour === 2) { target = candidate; break; }
    }

    // If 2am today is already in the past, advance to 2am tomorrow.
    if (target && target <= now) {
      target = new Date(target.getTime() + 24 * 3600000);
    }

    return target ? target.toISOString()
      : new Date(Date.now() + 26 * 3600000).toISOString(); // safe fallback
  }

  // Entry log element -- declared here so loadExistingEntries() can use it
  const entryLog = document.getElementById('entry-log');

  // 5. Entry sequence tracking
  let nextSequence = 1;

  try {
    const { data, error } = await supabase
      .from('session_entries')
      .select('entry_sequence')
      .eq('session_id', sessionId)
      .order('entry_sequence', { ascending: false })
      .limit(1);

    if (!error && data && data.length > 0) {
      nextSequence = data[0].entry_sequence + 1;
      await loadExistingEntries();
    }
  } catch (e) {
    console.warn('Could not fetch existing entries:', e);
  }

  // 6. Load existing entries (resume case)
  async function loadExistingEntries() {
    const { data, error } = await supabase
      .from('session_entries')
      .select('entry_id, entry_sequence, entry_text, created_at')
      .eq('session_id', sessionId)
      .eq('entry_source', 'teacher')
      .order('entry_sequence', { ascending: true });

    if (error || !data) return;
    data.forEach(row => appendEntryToLog(row.entry_text, row.created_at, row.entry_id, row.entry_sequence));
  }

  // 7. Entry log rendering
  function appendEntryToLog(text, isoTimestamp, entryId, sequence) {
    const opts = { hour: '2-digit', minute: '2-digit', timeZone: teacherTimezone };
    const time = isoTimestamp
      ? new Date(isoTimestamp).toLocaleTimeString('en-CA', opts)
      : new Date().toLocaleTimeString('en-CA', opts);

    const isIgnored = text.startsWith('[IGNORE] ');
    const displayText = isIgnored ? text.slice(9) : text;
    const seqLabel = sequence ? '#' + sequence + '    ' : '';

    const item = document.createElement('div');
    item.className = 'entry-item' + (isIgnored ? ' entry-ignored' : '');
    item.dataset.entryId   = entryId || '';
    item.dataset.sequence  = sequence || '';
    item.dataset.ignored   = isIgnored ? 'true' : 'false';
    item.dataset.cleanText = displayText;
    item.innerHTML = `
      <div class="entry-timestamp">${seqLabel}${time}</div>
      <div class="entry-text">${escapeHtml(displayText)}</div>
    `;
    if (entryId) {
      attachEntryListeners(item);
    }
    entryLog.appendChild(item);
    entryLog.scrollTop = entryLog.scrollHeight;
    updateCounter();
  }

  // Long-press + tap listeners
  function attachEntryListeners(item) {
    let pressTimer   = null;
    let didLongPress = false;

    function startPress() {
      didLongPress = false;
      pressTimer = setTimeout(() => {
        didLongPress = true;
        enterEditMode(item);
      }, 500);
    }

    function cancelPress() { clearTimeout(pressTimer); }

    function endPress() {
      clearTimeout(pressTimer);
      if (!didLongPress && !item.classList.contains('editing')) {
        toggleIgnore(item);
      }
      didLongPress = false;
    }

    item.addEventListener('mousedown',  startPress);
    item.addEventListener('touchstart', startPress,  { passive: true });
    item.addEventListener('mouseleave', cancelPress);
    item.addEventListener('touchmove',  cancelPress, { passive: true });
    item.addEventListener('mouseup',    endPress);
    item.addEventListener('touchend',   endPress);
  }

  // Inline edit mode
  function enterEditMode(item) {
    if (item.classList.contains('editing')) return;
    const cleanText = item.dataset.cleanText;
    const textEl    = item.querySelector('.entry-text');

    item.classList.remove('entry-ignored');
    item.classList.add('editing');

    const editArea = document.createElement('textarea');
    editArea.className = 'entry-edit-textarea';
    editArea.value = cleanText;
    editArea.style.height = 'auto';
    textEl.replaceWith(editArea);
    editArea.style.height = editArea.scrollHeight + 'px';
    editArea.focus();
    editArea.select();

    editArea.addEventListener('input', () => {
      editArea.style.height = 'auto';
      editArea.style.height = editArea.scrollHeight + 'px';
    });

    editArea.addEventListener('blur', () => saveEdit(item, editArea));
  }

  async function saveEdit(item, editArea) {
    const entryId = item.dataset.entryId;
    const newText = editArea.value.trim() || item.dataset.cleanText;

    const displayDiv = document.createElement('div');
    displayDiv.className = 'entry-text';
    displayDiv.textContent = newText;
    editArea.replaceWith(displayDiv);

    item.classList.remove('editing', 'entry-ignored');
    item.dataset.ignored   = 'false';
    item.dataset.cleanText = newText;

    const { error } = await supabase
      .from('session_entries')
      .update({ entry_text: newText })
      .eq('entry_id', entryId);

    if (error) {
      showStatus('Could not save edit. Please try again.', 'error', true);
    }
  }

  // Toggle ignore (short tap)
  async function toggleIgnore(item) {
    const entryId  = item.dataset.entryId;
    if (!entryId) return;

    const isIgnored = item.dataset.ignored === 'true';
    const cleanText = item.dataset.cleanText;
    const newText   = isIgnored ? cleanText : '[IGNORE] ' + cleanText;

    const { error } = await supabase
      .from('session_entries')
      .update({ entry_text: newText })
      .eq('entry_id', entryId);

    if (error) {
      showStatus('Could not update entry. Please try again.', 'error', true);
      return;
    }

    if (isIgnored) {
      item.classList.remove('entry-ignored');
      item.dataset.ignored = 'false';
    } else {
      item.classList.add('entry-ignored');
      item.dataset.ignored = 'true';
    }
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function updateCounter() {
    const count = entryLog.querySelectorAll('.entry-item').length;
    const counterEl = document.getElementById('entry-counter');
    counterEl.style.display = count > 0 ? 'block' : 'none';
    document.getElementById('count-num').textContent    = count;
    document.getElementById('count-plural').textContent = count === 1 ? '' : 's';
  }

  // 8. Status messaging
  let statusTimer = null;

  function showStatus(msg, type, autoDismiss) {
    type = type || 'error';
    const bar  = document.getElementById('status-msg');
    const text = document.getElementById('status-text');
    bar.className  = 'status-msg show ' + type;
    text.textContent = msg;
    if (statusTimer) clearTimeout(statusTimer);
    if (autoDismiss) {
      statusTimer = setTimeout(function() { bar.className = 'status-msg'; }, 3000);
    }
  }

  function hideStatus() {
    document.getElementById('status-msg').className = 'status-msg';
  }

  // 9. Write entry to Supabase
  async function writeEntry(text) {
    const btnSubmit = document.getElementById('btn-submit');
    btnSubmit.disabled = true;
    hideStatus();

    const row = {
      series_id:      seriesId,
      session_id:     sessionId,
      teacher_id:     teacherId,
      student_id:     studentId,
      entry_sequence: nextSequence,
      entry_text:     text,
      entry_source:   'teacher',
      exact_wording:  false,
      purge_after:    calcPurgeAfter()
    };

    const { error } = await supabase
      .from('session_entries')
      .insert(row);

    if (error) {
      showStatus('Note could not be saved. Please try again.', 'error', false);
      btnSubmit.disabled = false;
      return false;
    }

    nextSequence++;
    // Fetch the entry_id of the row we just inserted so the card supports ignore toggle
    const { data: inserted } = await supabase
      .from('session_entries')
      .select('entry_id')
      .eq('session_id', sessionId)
      .eq('entry_sequence', nextSequence - 1)
      .single();

    appendEntryToLog(text, null, inserted?.entry_id, nextSequence - 1);
    return true;
  }

  // 10. Input handling
  const textarea  = document.getElementById('entry-input');
  const btnSubmit = document.getElementById('btn-submit');

  textarea.addEventListener('input', function() {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    btnSubmit.disabled = textarea.value.trim().length === 0;
  });

  textarea.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!btnSubmit.disabled) handleSubmit();
    }
  });

  btnSubmit.addEventListener('click', handleSubmit);

  async function handleSubmit() {
    const text = textarea.value.trim();
    if (!text) return;

    if (recognition && listening) recognition.stop();
    btnSubmit.disabled = true;
    const ok = await writeEntry(text);

    if (ok) {
      textarea.value = '';
      textarea.style.height = 'auto';
      btnSubmit.disabled = true;
      textarea.focus();
    } else {
      btnSubmit.disabled = false;
    }
  }

  // 11. Browser mic (Web Speech API -- error handling stubbed)
  const btnMic = document.getElementById('btn-mic');

  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  let recognition = null;
  let listening = false;

  if (!SpeechRecognition) {
    btnMic.style.display = 'none';
  } else {
    recognition = new SpeechRecognition();
    recognition.lang           = 'en-CA';
    recognition.continuous     = true;
    recognition.interimResults = true;

    let textBeforeMic = ''; // not used (full erase/rewrite) -- retained for clarity

    btnMic.addEventListener('click', function() {
      if (listening) { recognition.stop(); return; }
      // Clear textarea immediately on mic tap
      textarea.value = '';
      textarea.style.height = 'auto';
      btnSubmit.disabled = true;
      recognition.start();
    });

    recognition.onstart = function() {
      listening = true;
      btnMic.classList.add('listening');
      btnMic.setAttribute('aria-label', 'Stop voice input');
      btnSubmit.disabled = true;
    };

    recognition.onresult = function(e) {
      // Build the full transcript from all results so far
      // Final results are committed; interim results stream in
      let finalText   = '';
      let interimText = '';

      for (let i = 0; i < e.results.length; i++) {
        const result = e.results[i];
        if (result.isFinal) {
          finalText += result[0].transcript;
        } else {
          interimText += result[0].transcript;
        }
      }

      // Show final + interim combined in textarea
      textarea.value = (finalText + interimText).trim();
      textarea.dispatchEvent(new Event('input'));
    };

    recognition.onend = function() {
      listening = false;
      btnMic.classList.remove('listening');
      btnMic.setAttribute('aria-label', 'Start voice input');
      // Trim final value cleanly
      textarea.value = textarea.value.trim();
      textarea.dispatchEvent(new Event('input'));
      btnSubmit.disabled = textarea.value.trim().length === 0;
    };

    recognition.onerror = function() {
      listening = false;
      btnMic.classList.remove('listening');
      btnSubmit.disabled = textarea.value.trim().length === 0;
    };
  }

  // Confirm the book change — writes Sessions + Students, updates sessionStorage + header
  async function confirmBookChange() {
    const select     = document.getElementById('book-modal-select');
    const confirmBtn = document.getElementById('btn-book-confirm');
    const cancelBtn  = document.getElementById('btn-book-cancel');
    const errEl      = document.getElementById('book-modal-error');

    const selectedId   = select.value;
    const selectedName = select.options[select.selectedIndex].text;

    if (!selectedId) return;

    confirmBtn.disabled = true;
    cancelBtn.disabled  = true;
    confirmBtn.textContent = 'Saving\u2026';
    errEl.style.display = 'none';

    try {
      const [sessErr, stuErr] = await Promise.all([
        supabase.from('sessions')
          .update({ lesson_book_id: selectedId })
          .eq('session_id', sessionId)
          .then(r => r.error),

        supabase.from('students')
          .update({ current_book: selectedId })
          .eq('student_id', studentId)
          .then(r => r.error)
      ]);

      if (sessErr || stuErr) {
        const msg = sessErr?.message || stuErr?.message || 'Unknown error';
        errEl.textContent   = 'Could not save book change: ' + msg + '. Please try again.';
        errEl.style.display = 'block';
        confirmBtn.disabled    = false;
        cancelBtn.disabled     = false;
        confirmBtn.textContent = 'Confirm Change';
        return;

      currentBookName = selectedName;

      errEl.textContent   = 'An unexpected error occurred. Please try again.';

    if (historySessions.length > 1) {
      selectorHtml = '<select class="history-date-select" id="history-date-select" aria-label="Select lesson date">';

        selectorHtml += '<option value="' + i + '"' + (i === index ? ' selected' : '') + '>' + escapeHtml(label) + '</option>';

  function historyContentBlock(label, text, renderLinks) {
    const isEmpty = !text || text.trim() === '';
    const body    = isEmpty
      ? '<div class="history-content-empty">Not recorded.</div>'
      : '<div class="history-content-body">' + (renderLinks ? historyMarkdownLinks(escapeHtml(text)) : escapeHtml(text)) + '</div>';

      '<div class="history-content-label">' + label + '</div>' +

  function historyContentBlockWithActive(label, text, assignments) {
    const isEmpty = !text || text.trim() === '';
    const body = isEmpty
      ? '<div class="history-content-empty">Not recorded.</div>'
      : '<div class="history-content-body">' + escapeHtml(text) + '</div>';

      '<div class="history-content-label">' + label + '</div>' +

  function historySupplementBlock(label, data) {
    const items = (data || []).slice(0, 3);
    const isEmpty = items.length === 0;
    const body = isEmpty
      ? '<div class="history-content-empty">Not recorded.</div>'
      : '<div class="history-supp-list">' +
        items.map(s => buildHistorySuppItem(s, true)).join('') +
        '</div>';

      '<div class="history-content-label">' + label + '</div>' +
      body + '</div>';

  function buildHistorySuppItem(s, showBadge) {
    const bookSvg = '<svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20V2H6.5A2.5 2.5 0 0 0 4 4.5v15z"/></svg>';
    const thumb = s.thumbnail_url
      ? '<img class="history-supp-thumb" src="' + escapeHtml(s.thumbnail_url) + '" alt="" loading="lazy"' +
        ' onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
        '<div class="history-supp-thumb-placeholder" style="display:none">' + bookSvg + '</div>'
      : '<div class="history-supp-thumb-placeholder">' + bookSvg + '</div>';

    let badge = '';
    if (showBadge) {
      badge = s.is_free === true
        ? '<span class="history-badge-free">Free</span>'
        : s.is_free === false
          ? '<span class="history-badge-paid">Resource</span>'
          : '';
    }
    const pool = (showBadge && s.pool === 'fallback') ? '<span>General resource</span>' : '';

    const link = s.source_url
      ? '<a class="history-supp-link" href="' + escapeHtml(s.source_url) + '" target="_blank" rel="noopener" aria-label="Open ' + escapeHtml(s.title || '') + '">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        '<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14 21 3"/>' +
        '</svg></a>'
      : '';

    return '<div class="history-supp-item">' +
      thumb +
      '<div class="history-supp-info">' +
        '<div class="history-supp-title">' + escapeHtml(s.title || 'Untitled') + '</div>' +
        ((badge || pool) ? '<div class="history-supp-meta">' + badge + pool + '</div>' : '') +
      '</div>' +
      link + '</div>';
  }

  function historyTopThree(text) {
    if (!text) return '';
    return text.split('\n').map(l => l.trim()).filter(l => l.length > 0).slice(0, 3).join('\n');

  function historyMarkdownLinks(escapedText) {
    return escapedText.replace(

    );

  const _atp    = document.getElementById('assign-thumb-preview');

  function assignThumbHover(e, src) {
    if (!src) return;
    _atpImg.src = src;
    _atp.style.display = 'block';
    _assignPositionPreview(e);
  }

  function _assignPositionPreview(e) {
    const pad = 12, pw = 208;
    let left = e.clientX + pad;
    let top  = e.clientY - 60;
    if (left + pw > window.innerWidth) left = e.clientX - pw - pad;
    if (top < 8) top = 8;
    _atp.style.left = left + 'px';
    _atp.style.top  = top  + 'px';
  }

  function assignThumbLeave() { _atp.style.display = 'none'; }

  function attachAssignThumbEvents(el, src, url) {
    if (src) {
      el.addEventListener('mouseenter', e => assignThumbHover(e, src));
      el.addEventListener('mousemove',  e => _assignPositionPreview(e));
      el.addEventListener('mouseleave', assignThumbLeave);
    }
    if (url) el.addEventListener('click', () => window.open(url, '_blank', 'noopener'));
  }

  let _activeAssignments = []; // cache: full rows from student_assignments

  async function loadAssignments() {
    const { data, error } = await supabase
      .from('student_assignments')
      .select('student_assignment_id, supplement_id, assigned_at')
      .eq('student_id', studentId)
      .eq('teacher_id', teacherId)
      .eq('is_active', true)
      .order('assigned_at', { ascending: true });

    if (error) {
      console.warn('Could not load assignments:', error);
      return;
    }

    if (!data || data.length === 0) {
      _activeAssignments = [];
      renderAssignmentStrip();
      return;
    }

    // Fetch supplement details for each assigned supplement_id
    const suppIds = data.map(r => r.supplement_id);
    const { data: supps, error: sErr } = await supabase
      .from('supplements')
      .select('supplement_id, title, source_url, thumbnail_url')
      .in('supplement_id', suppIds);

    if (sErr) {
      console.warn('Could not load supplement details for assignments:', sErr);
      _activeAssignments = [];
      renderAssignmentStrip();
      return;
    }

    const suppMap = {};
    (supps || []).forEach(s => { suppMap[s.supplement_id] = s; });

    _activeAssignments = data.map(row => ({
      student_assignment_id: row.student_assignment_id,
      supplement_id:         row.supplement_id,
      title:       suppMap[row.supplement_id]?.title       || 'Unknown supplement',
      source_url:  suppMap[row.supplement_id]?.source_url  || null,
      thumbnail_url: suppMap[row.supplement_id]?.thumbnail_url || null,
    }));

    renderAssignmentStrip();

  function renderAssignmentStrip() {
    const frame     = document.getElementById('assign-list-frame');
    const container = document.getElementById('assign-list-items');

    if (_activeAssignments.length === 0) {
      frame.classList.add('hidden');
      container.innerHTML = '';
      return;
    }

    frame.classList.remove('hidden');

    container.innerHTML = _activeAssignments.map(a => {
      const thumbInner = a.thumbnail_url
        ? `<img src="${escapeHtml(a.thumbnail_url)}" alt="" loading="lazy" />`
        : '🎵';
      const hasUrl = !!a.source_url;
      return `<div class="assign-list-item" data-assignment-id="${escapeHtml(a.student_assignment_id)}">

             data-src="${escapeHtml(a.thumbnail_url || '')}"
             data-url="${escapeHtml(a.source_url || '')}"
        >${thumbInner}</div>
        <div class="assign-item-title" title="${escapeHtml(a.title)}">${escapeHtml(a.title)}</div>
        <button class="btn-assign-remove" data-assignment-id="${escapeHtml(a.student_assignment_id)}" aria-label="Remove assignment">Remove</button>
      </div>`;

  async function confirmRemoveAssignment(assignmentId) {
    const rec = _activeAssignments.find(a => a.student_assignment_id === assignmentId);

    const ok = window.confirm('Remove \u201c' + title + '\u201d from ' + (studentName || 'this student') + '\u2019s assignments?');

    const now = new Date().toISOString();

  let _assignSupplements = [];  // all active supplements for the series

  async function openAssignModal() {

      '<div class="assign-modal-loading">Loading\u2026</div>';

          .select('supplement_id, title, source_url, thumbnail_url, is_free')
          .eq('series_id', seriesId)
          .eq('is_active', true)

  function renderAssignModalList() {
    const query  = (document.getElementById('assign-modal-search').value || '').trim().toLowerCase();
    const listEl = document.getElementById('assign-modal-list');

    // Active assignment supplement_ids — skip duplicates
    const activeIds = new Set(_activeAssignments.map(a => a.supplement_id));

    // Filter by search
    let filtered = _assignSupplements;
    if (query) {
      filtered = filtered.filter(s =>
        s.title.toLowerCase().includes(query) ||
        (s.curriculum_hint && s.curriculum_hint.toLowerCase().includes(query))
      );
    }

    if (filtered.length === 0) {
      listEl.innerHTML = '<div class="assign-modal-empty">No supplements match your search.</div>';
      return;
    }

    // Sort into three buckets
    const mappedPaid = filtered.filter(s => _assignMappedIds.has(s.supplement_id) && s.is_free !== true);
    const mappedFree = filtered.filter(s => _assignMappedIds.has(s.supplement_id) && s.is_free === true);
    const rest       = filtered.filter(s => !_assignMappedIds.has(s.supplement_id));

    let html = '';

    if (mappedPaid.length > 0) {
      html += '<div class="assign-modal-section-label">Mapped to this workbook</div>';
      html += mappedPaid.map(s => buildAssignSuppRow(s, activeIds)).join('');
    }

    if (mappedFree.length > 0) {
      if (mappedPaid.length > 0) html += '<div class="assign-modal-section-label">Free — mapped to this workbook</div>';
      else html += '<div class="assign-modal-section-label">Mapped to this workbook</div>';
      html += mappedFree.map(s => buildAssignSuppRow(s, activeIds)).join('');
    }

    if (rest.length > 0) {
      if (mappedPaid.length > 0 || mappedFree.length > 0) {
        html += '<div class="assign-modal-section-label">Other supplements</div>';
      }
      html += rest.map(s => buildAssignSuppRow(s, activeIds)).join('');
    }

    listEl.innerHTML = html;

    // Wire checkboxes and thumb events
    listEl.querySelectorAll('.assign-supp-row').forEach(row => {
      const suppId = row.dataset.suppId;
      if (!suppId || row.classList.contains('already-assigned')) return;

      const cb = row.querySelector('.assign-supp-check');
      cb.checked = _assignChecked.has(suppId);

      row.addEventListener('click', function(e) {
        if (e.target === cb) return; // let checkbox handle its own click natively
        if (e.target.classList.contains('assign-supp-thumb') ||
            e.target.closest('.assign-supp-thumb.clickable')) return;
        cb.checked = !cb.checked;
        if (cb.checked) _assignChecked.add(suppId);
        else _assignChecked.delete(suppId);
      });

      cb.addEventListener('change', function() {
        if (this.checked) _assignChecked.add(suppId);
        else _assignChecked.delete(suppId);
      });

      const thumbEl = row.querySelector('.assign-supp-thumb');
      if (thumbEl) {
        const src = thumbEl.dataset.src || null;
        const url = thumbEl.dataset.url || null;
        attachAssignThumbEvents(thumbEl, src, url);
        if (url) thumbEl.classList.add('clickable');
      }
    });
  }

  function buildAssignSuppRow(s, activeIds) {
    const alreadyAssigned = activeIds.has(s.supplement_id);
    const isChecked = _assignChecked.has(s.supplement_id);

    const thumbInner = s.thumbnail_url
      ? `<img src="${escapeHtml(s.thumbnail_url)}" alt="" loading="lazy" />`
      : '🎵';

    const freeBadge = s.is_free === true
      ? `<span class="asgn-badge asgn-badge-free">free</span>`
      : s.is_free === false
        ? `<span class="asgn-badge asgn-badge-paid">paid</span>`
        : '';

    const assignedBadge = alreadyAssigned
      ? `<span class="asgn-badge asgn-badge-assigned">assigned</span>`
      : '';

    const mappedBadge = _assignMappedIds.has(s.supplement_id) && !alreadyAssigned
      ? `<span class="asgn-badge asgn-badge-mapped">mapped</span>`
      : '';

    return `<div class="assign-supp-row${alreadyAssigned ? ' already-assigned' : ''}"
                 data-supp-id="${escapeHtml(s.supplement_id)}">
      <input type="checkbox" class="assign-supp-check"
             ${isChecked && !alreadyAssigned ? 'checked' : ''}
             ${alreadyAssigned ? 'disabled' : ''}
             aria-label="${escapeHtml(s.title)}" />
      <div class="assign-supp-thumb${s.source_url ? ' clickable' : ''}"
           data-src="${escapeHtml(s.thumbnail_url || '')}"
           data-url="${escapeHtml(s.source_url || '')}"
      >${thumbInner}</div>
      <div class="assign-supp-body">
        <div class="assign-supp-title">${escapeHtml(s.title)}</div>
        <div class="assign-supp-meta">${freeBadge}${mappedBadge}${assignedBadge}</div>
      </div>
    </div>`;
  }

  async function acceptAssignments() {
    const toAssign = [..._assignChecked].filter(
      id => !_activeAssignments.find(a => a.supplement_id === id)
    );

    if (toAssign.length === 0) {
      document.getElementById('assign-modal').classList.add('hidden');
      return;
    }

    const acceptBtn  = document.getElementById('btn-assign-accept');
    const cancelBtn  = document.getElementById('btn-assign-cancel');
    const errEl      = document.getElementById('assign-modal-error');
    acceptBtn.disabled = true;
    cancelBtn.disabled = true;
    acceptBtn.textContent = 'Saving\u2026';
    errEl.style.display   = 'none';

    // Build supplement lookup for the rows we're about to insert
    const suppLookup = {};
    _assignSupplements.forEach(s => { suppLookup[s.supplement_id] = s; });

    const rows = toAssign.map(suppId => {
      const s = suppLookup[suppId] || {};
      return {
        series_id:    seriesId,
        teacher_id:   teacherId,
        student_id:   studentId,
        supplement_id: suppId,
        source_url:   s.source_url || null,
        is_active:    true,
      };
    });

    const { error } = await supabase
      .from('student_assignments')
      .insert(rows);

    acceptBtn.disabled    = false;
    cancelBtn.disabled    = false;
    acceptBtn.textContent = 'Assign Selected';

    if (error) {
      errEl.textContent   = 'Could not save assignments. Please try again.';
      errEl.style.display = 'block';
      console.warn('Assignment insert error:', error);
      return;
    }

    document.getElementById('assign-modal').classList.add('hidden');
    _assignChecked = new Set();
    // Reload assignments strip — rebuilds from DB to pick up new rows
    _assignModalReady = false; // force modal list rebuild on next open (active badge refresh)
    await loadAssignments();
  }

  // Wire assign modal buttons
  document.getElementById('btn-assign').addEventListener('click', openAssignModal);
  document.getElementById('btn-assign-modal-close').addEventListener('click', function() {
    document.getElementById('assign-modal').classList.add('hidden');
  });
  document.getElementById('btn-assign-cancel').addEventListener('click', function() {
    document.getElementById('assign-modal').classList.add('hidden');
  });
  document.getElementById('btn-assign-accept').addEventListener('click', acceptAssignments);
  document.getElementById('assign-modal-search').addEventListener('input', renderAssignModalList);

  // Close assign modal on backdrop tap
  document.getElementById('assign-modal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.add('hidden');
  });

  // Load active assignments on page load
  await loadAssignments();

</script>

</body>
</html>
