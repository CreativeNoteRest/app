<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lesson History</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:       #E26B0A;
      --brand-light: #FCE4D6;
      --text:        #1A1A1A;
      --text-mid:    #5A5A5A;
      --text-muted:  #9A9A9A;
      --border:      #E8E4DF;
      --bg:          #FAFAF8;
      --white:       #FFFFFF;
      --retired-bg:  #F5F5F5;
      --error-bg:    #FFF0F0;
      --error-text:  #CC0000;
      --pdf-sent:    #2E7D32;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-back {
      background: none; border: none; cursor: pointer;
      padding: 8px; margin-left: -8px;
      color: var(--brand); font-size: 20px; line-height: 1;
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
    }
    .header-back:hover { background: var(--brand-light); }
    .header-title { font-size: 17px; font-weight: 600; color: var(--text); flex: 1; }

    /* ── Content ── */
    .content { max-width: 640px; margin: 0 auto; padding: 16px; }

    /* ── Toolbar ── */
    .toolbar { display: flex; align-items: center; padding: 10px 0 14px; }
    .toolbar label {
      font-size: 14px; color: var(--text-mid); cursor: pointer;
      user-select: none; display: flex; align-items: center; gap: 6px;
    }
    .toolbar input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--brand); cursor: pointer; }

    /* ── Lists ── */
    .card-list { display: flex; flex-direction: column; gap: 2px; }

    /* ── Student row ── */
    .student-row {
      background: var(--white); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; cursor: pointer; display: flex; align-items: center;
      justify-content: space-between; transition: background 0.12s, border-color 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .student-row:hover { background: var(--brand-light); border-color: var(--brand); }
    .student-row:active { background: #FFE8D4; }
    .student-row.retired { background: var(--retired-bg); color: var(--text-muted); }
    .student-row.retired:hover { background: #EEEEEE; border-color: #CCC; }
    .student-name { font-size: 16px; font-weight: 500; }
    .chevron { color: var(--text-muted); font-size: 18px; margin-left: 8px; }

    /* ── Session row ── */
    .session-row {
      background: var(--white); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; cursor: pointer; display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px;
      transition: background 0.12s, border-color 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .session-row:hover { background: var(--brand-light); border-color: var(--brand); }
    .session-row:active { background: #FFE8D4; }
    .session-info { flex: 1; min-width: 0; }
    .session-date { font-size: 15px; font-weight: 600; color: var(--text); }
    .session-book { font-size: 13px; color: var(--text-mid); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-page { font-size: 13px; color: var(--text-muted); margin-top: 1px; }
    .pdf-sent-badge { font-size: 12px; color: var(--pdf-sent); margin-top: 4px; }

    /* ── Detail view ── */
    .detail-header {
      background: var(--white); border: 1px solid var(--border); border-radius: 10px;
      padding: 16px; margin-bottom: 12px;
    }
    .detail-student { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .detail-meta { font-size: 13px; color: var(--text-mid); line-height: 1.6; }

    .content-block {
      background: var(--white); border: 1px solid var(--border); border-radius: 10px;
      padding: 16px; margin-bottom: 12px;
    }
    .content-block-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--brand); margin-bottom: 10px;
    }
    .content-block-body {
      font-size: 14px; color: var(--text); line-height: 1.65;
      white-space: pre-wrap; word-break: break-word;
    }
    .content-block-body a {
      color: var(--brand); text-decoration: underline; word-break: break-all;
    }
    .content-block-empty { font-size: 14px; color: var(--text-muted); font-style: italic; }

    /* ── Email PDF button ── */
    .pdf-btn-wrap { margin-bottom: 24px; }
    .pdf-btn {
      width: 100%; padding: 16px; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      border: 1.5px solid var(--brand); background: var(--white);
      color: var(--brand); transition: background 0.15s;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .pdf-btn:hover:not(:disabled) { background: var(--brand-light); }
    .pdf-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .pdf-btn-sub { font-size: 12px; font-weight: 400; color: var(--text-muted); }

    /* ── States ── */
    .empty-state  { text-align: center; padding: 48px 16px; color: var(--text-muted); font-size: 15px; }
    .loading-state { text-align: center; padding: 48px 16px; color: var(--text-muted); font-size: 15px; }

    .error-banner {
      background: var(--error-bg); color: var(--error-text);
      border: 1px solid #FFCCCC; border-radius: 8px;
      padding: 12px 14px; font-size: 14px; margin-bottom: 12px; display: none;
    }
    .error-banner.visible { display: block; }

    .section-label {
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px; padding: 16px 4px 6px;
    }
  </style>
</head>
<body>

<header class="header">
  <button class="header-back" id="backBtn" aria-label="Back">&#8592;</button>
  <span class="header-title" id="headerTitle">Lesson History</span>
</header>

<main class="content">
  <div id="errorBanner" class="error-banner" role="alert"></div>

  <!-- VIEW 1: Student selector -->
  <div id="viewStudents">
    <div class="toolbar">
      <label>
        <input type="checkbox" id="activeOnlyCheck" checked />
        Active students only
      </label>
    </div>
    <div class="card-list" id="studentList">
      <div class="loading-state">Loading students...</div>
    </div>
  </div>

  <!-- VIEW 2: Session list -->
  <div id="viewSessions" style="display:none;">
    <div class="card-list" id="sessionList">
      <div class="loading-state">Loading lessons...</div>
    </div>
  </div>

  <!-- VIEW 3: Session detail -->
  <div id="viewDetail" style="display:none;">
    <div id="detailContent"></div>
  </div>

</main>

<script type="module">
  import { supabase, requireAuth } from '/assets/app.js';

  await requireAuth();

  const teacherId = sessionStorage.getItem('teacher_id');

  // ── State ─────────────────────────────────────────────────────────────
  let allStudents     = [];
  let selectedStudent = null;           // { student_id, safe_name }
  let sessionRows     = [];             // cached session list for current student
  let view            = 'students';     // 'students' | 'sessions' | 'detail'

  // ── DOM refs ──────────────────────────────────────────────────────────
  const viewStudents    = document.getElementById('viewStudents');
  const viewSessions    = document.getElementById('viewSessions');
  const viewDetail      = document.getElementById('viewDetail');
  const studentList     = document.getElementById('studentList');
  const sessionList     = document.getElementById('sessionList');
  const detailContent   = document.getElementById('detailContent');
  const activeOnlyCheck = document.getElementById('activeOnlyCheck');
  const headerTitle     = document.getElementById('headerTitle');
  const backBtn         = document.getElementById('backBtn');
  const errorBanner     = document.getElementById('errorBanner');

  function showErr(msg) { errorBanner.textContent = msg; errorBanner.classList.add('visible'); }
  function clearErr()   { errorBanner.textContent = '';  errorBanner.classList.remove('visible'); }

  // ── Back button -- three-level navigation ─────────────────────────────
  backBtn.addEventListener('click', () => {
    if (view === 'detail') {
      // Detail -> session list
      view = 'sessions';
      headerTitle.textContent = selectedStudent.safe_name + ' -- Lessons';
      viewDetail.style.display  = 'none';
      viewSessions.style.display = '';
      clearErr();
    } else if (view === 'sessions') {
      // Session list -> student selector
      view = 'students';
      selectedStudent = null;
      sessionRows = [];
      headerTitle.textContent = 'Lesson History';
      viewSessions.style.display = 'none';
      viewStudents.style.display  = '';
      clearErr();
    } else {
      window.location.href = '/main_menu.html';
    }
  });

  // ── STUDENTS ──────────────────────────────────────────────────────────
  async function loadStudents() {
    studentList.innerHTML = '<div class="loading-state">Loading students...</div>';
    clearErr();

    const { data, error } = await supabase
      .from('students')
      .select('student_id, safe_name, student_status')
      .eq('teacher_id', teacherId)
      .not('student_status', 'in', '("archived","deleted")')
      .order('student_status', { ascending: true })
      .order('safe_name',      { ascending: true });

    if (error) { showErr('Could not load students. Please try again.'); studentList.innerHTML = ''; return; }

    allStudents = data || [];
    renderStudents();
  }

  function renderStudents() {
    const activeOnly = activeOnlyCheck.checked;
    const filtered   = activeOnly ? allStudents.filter(s => s.student_status === 'active') : allStudents;

    if (filtered.length === 0) {
      studentList.innerHTML = '<div class="empty-state">' + (activeOnly ? 'No active students.' : 'No students found.') + '</div>';
      return;
    }

    const active  = filtered.filter(s => s.student_status === 'active');
    const retired = filtered.filter(s => s.student_status !== 'active');
    let html = '';
    active.forEach(s  => { html += studentRowHTML(s, false); });
    if (retired.length > 0) {
      html += '<div class="section-label">Retired</div>';
      retired.forEach(s => { html += studentRowHTML(s, true); });
    }
    studentList.innerHTML = html;
    studentList.querySelectorAll('.student-row').forEach(el => {
      el.addEventListener('click', () => {
        const s = allStudents.find(x => x.student_id === el.dataset.studentId);
        if (s) openStudent(s);
      });
    });
  }

  function studentRowHTML(s, retired) {
    return '<div class="student-row' + (retired ? ' retired' : '') +
      '" data-student-id="' + s.student_id + '" role="button" tabindex="0">' +
      '<span class="student-name">' + escHtml(s.safe_name) + '</span>' +
      '<span class="chevron">&#8250;</span></div>';
  }

  activeOnlyCheck.addEventListener('change', renderStudents);

  function openStudent(student) {
    view = 'sessions';
    selectedStudent = student;
    headerTitle.textContent = student.safe_name + ' -- Lessons';
    viewStudents.style.display = 'none';
    viewSessions.style.display  = '';
    clearErr();
    loadSessions(student.student_id);
  }

  // ── SESSIONS ──────────────────────────────────────────────────────────
  async function loadSessions(studentId) {
    sessionList.innerHTML = '<div class="loading-state">Loading lessons...</div>';

    const { data: sessions, error: sessErr } = await supabase
      .from('sessions')
      .select('session_id, session_date, max_lesson_page, pdf_sent_at, pdf_sent_to, lesson_book_id')
      .eq('teacher_id', teacherId)
      .eq('student_id', studentId)
      .eq('session_status', 'approved')
      .order('session_date', { ascending: false });

    if (sessErr) { showErr('Could not load lessons. Please try again.'); sessionList.innerHTML = ''; return; }

    const rows = sessions || [];

    // Fetch book names for all unique book IDs
    const bookIds = [...new Set(rows.map(s => s.lesson_book_id).filter(Boolean))];
    const bookMap = {};
    if (bookIds.length > 0) {
      const { data: books } = await supabase
        .from('books')
        .select('book_id, full_display_name')
        .in('book_id', bookIds);
      (books || []).forEach(b => { bookMap[b.book_id] = b.full_display_name; });
    }

    rows.forEach(s => {
      s.bookName = s.lesson_book_id ? (bookMap[s.lesson_book_id] || 'Unknown book') : 'Book not recorded';
    });

    sessionRows = rows; // cache for detail view -- avoids re-fetch
    renderSessions(rows);
  }

  function renderSessions(sessions) {
    if (sessions.length === 0) {
      sessionList.innerHTML = '<div class="empty-state">No completed lessons yet for ' + escHtml(selectedStudent.safe_name) + '.</div>';
      return;
    }

    let html = '';
    sessions.forEach(s => {
      const pdfLine = s.pdf_sent_at ? '<div class="pdf-sent-badge">&#10003; PDF sent ' + formatDate(s.pdf_sent_at) + '</div>' : '';
      html += '<div class="session-row" data-session-id="' + s.session_id + '" role="button" tabindex="0">' +
        '<div class="session-info">' +
        '<div class="session-date">' + escHtml(formatDate(s.session_date)) + '</div>' +
        '<div class="session-book">' + escHtml(s.bookName) + '</div>' +
        '<div class="session-page">' + escHtml(s.max_lesson_page ? 'Page ' + s.max_lesson_page : 'Page not recorded') + '</div>' +
        pdfLine + '</div><span class="chevron">&#8250;</span></div>';
    });

    sessionList.innerHTML = html;

    sessionList.querySelectorAll('.session-row').forEach(el => {
      el.addEventListener('click', () => { openDetail(el.dataset.sessionId); });
    });
  }

  // ── DETAIL ────────────────────────────────────────────────────────────
  async function openDetail(sessionId) {
    view = 'detail';
    headerTitle.textContent = selectedStudent.safe_name;
    viewSessions.style.display = 'none';
    viewDetail.style.display   = '';
    detailContent.innerHTML    = '<div class="loading-state">Loading lesson...</div>';
    clearErr();

    // Fetch full session record -- content fields not loaded in list view
    const { data: session, error } = await supabase
      .from('sessions')
      .select('session_id, session_date, max_lesson_page, lesson_book_id, ai_summ_teacher, ai_summ_student, ai_summ_supplement, pdf_sent_at, pdf_sent_to')
      .eq('session_id', sessionId)
      .single();

    if (error || !session) {
      detailContent.innerHTML = '<div class="empty-state">Could not load lesson detail. Please go back and try again.</div>';
      return;
    }

    // Book name: use cached value if available, else fall back to lesson_book_id lookup
    const cached = sessionRows.find(s => s.session_id === sessionId);
    let bookName = cached ? cached.bookName : 'Unknown book';

    renderDetail(session, bookName);
  }

  function renderDetail(s, bookName) {
    const pageStr    = s.max_lesson_page ? 'Page ' + s.max_lesson_page : 'Page not recorded';
    const dateStr    = formatDate(s.session_date);
    const hasPdfSent = !!s.pdf_sent_at;
    const pdfBtnLabel = hasPdfSent ? 'Resend Practice Plan' : 'Email Practice Plan';
    const pdfBtnSub   = hasPdfSent
      ? 'Last sent ' + formatDate(s.pdf_sent_at) + ' to ' + escHtml(s.pdf_sent_to || '')
      : '';

    detailContent.innerHTML =
      // Header block
      '<div class="detail-header">' +
        '<div class="detail-student">' + escHtml(selectedStudent.safe_name) + '</div>' +
        '<div class="detail-meta">' +
          escHtml(dateStr) + '<br>' +
          escHtml(bookName) + '<br>' +
          escHtml(pageStr) +
        '</div>' +
      '</div>' +

      // Teacher Summary
      contentBlock('Teacher Summary', s.ai_summ_teacher, false) +

      // Student Practice Plan
      contentBlock('Student Practice Plan', s.ai_summ_student, false) +

      // Recommended Supplements -- top 3 only, priority order matches approval screen
      contentBlock('Recommended Supplements', topThree(s.ai_summ_supplement), true) +

      // Email PDF button (disabled -- Step 5 will wire this)
      '<div class="pdf-btn-wrap">' +
        '<button class="pdf-btn" id="pdfBtn" disabled>' +
          escHtml(pdfBtnLabel) +
          (pdfBtnSub ? '<span class="pdf-btn-sub">' + escHtml(pdfBtnSub) + '</span>' : '') +
        '</button>' +
      '</div>';
  }

  function contentBlock(label, text, renderLinks) {
    const isEmpty = !text || text.trim() === '';
    const body    = isEmpty
      ? '<div class="content-block-empty">Not recorded.</div>'
      : '<div class="content-block-body">' + (renderLinks ? markdownLinks(escHtml(text)) : escHtml(text)) + '</div>';
    return '<div class="content-block">' +
      '<div class="content-block-label">' + label + '</div>' +
      body +
      '</div>';
  }

  // Return the first 3 non-empty lines of ai_summ_supplement text
  function topThree(text) {
    if (!text) return '';
    return text.split('\n').map(l => l.trim()).filter(l => l.length > 0).slice(0, 3).join('\n');
  }

  // Convert markdown-style [Title](url) links to <a> tags
  // Applied AFTER escHtml so we work with escaped text and insert safe HTML
  function markdownLinks(escapedText) {
    return escapedText.replace(
      /\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
      '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>'
    );
  }

  // ── Utilities ─────────────────────────────────────────────────────────
  function formatDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-CA', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadStudents();
</script>

</body>
</html>
