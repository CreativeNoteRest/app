<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lesson History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:          #DB6E2B;
      --brand-light:    #FAEADE;
      --brand-dark:     #B85A1E;
      --text:           #1A1A1A;
      --text-mid:       #5A5A5A;
      --text-light:     #9A9A9A;
      --surface:        #FAFAF8;
      --card:           #FFFFFF;
      --border:         #E8E4DF;
      --radius:         12px;
      --shadow:         0 2px 16px rgba(0,0,0,0.07);
      --shadow-sm:      0 1px 3px rgba(0,0,0,0.07);
      --danger:         #DC2626;
      --danger-light:   #FEF2F2;
      --danger-border:  #FECACA;
      --success:        #16A34A;
      --retired-bg:     #F5F5F5;
      --error-bg:       #FFF0F0;
      --error-text:     #CC0000;
      --pdf-sent:       #2E7D32;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-back {
      background: none; border: none; cursor: pointer;
      padding: 8px; margin-left: -8px;
      color: var(--brand); font-size: 20px; line-height: 1;
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
    }
    .header-back:hover { background: var(--brand-light); }
    .header-menu {
      background: none; border: 1.5px solid var(--brand); border-radius: 6px;
      cursor: pointer; font-size: 13px; font-weight: 600; color: var(--brand);
      padding: 4px 10px; white-space: nowrap; display: none;
    }
    .header-menu:hover { background: var(--brand-light); }
    .header-title { font-size: 17px; font-weight: 600; color: var(--text); flex: 1; }

    /* ── Content ── */
    .content { max-width: 640px; margin: 0 auto; padding: 16px; }

    /* ── Toolbar ── */
    .toolbar { display: flex; align-items: center; padding: 10px 0 14px; }
    .toolbar label {
      font-size: 14px; color: var(--text-mid); cursor: pointer;
      user-select: none; display: flex; align-items: center; gap: 6px;
    }
    .toolbar input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--brand); cursor: pointer; }

    /* ── Lists ── */
    .card-list { display: flex; flex-direction: column; gap: 2px; }

    /* ── Student row ── */
    .student-row {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; cursor: pointer; display: flex; align-items: center;
      justify-content: space-between; transition: background 0.12s, border-color 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .student-row:hover { background: var(--brand-light); border-color: var(--brand); }
    .student-row:active { background: #FFE8D4; }
    .student-row.retired { background: var(--retired-bg); color: var(--text-light); }
    .student-row.retired:hover { background: #EEEEEE; border-color: #CCC; }
    .student-name { font-size: 16px; font-weight: 500; }
    .chevron { color: var(--text-light); font-size: 18px; margin-left: 8px; }

    /* ── Session row ── */
    .session-row {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; cursor: pointer; display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px;
      transition: background 0.12s, border-color 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .session-row:hover { background: var(--brand-light); border-color: var(--brand); }
    .session-row:active { background: #FFE8D4; }
    .session-info { flex: 1; min-width: 0; }
    .session-date { font-size: 15px; font-weight: 600; color: var(--text); }
    .session-book { font-size: 13px; color: var(--text-mid); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-page { font-size: 13px; color: var(--text-light); margin-top: 1px; }
    .pdf-sent-badge { font-size: 12px; color: var(--pdf-sent); margin-top: 4px; }

    /* ── Detail view ── */
    .detail-header {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 16px; margin-bottom: 12px;
    }
    .detail-student { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .detail-meta { font-size: 13px; color: var(--text-mid); line-height: 1.6; }

    .content-block {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 16px; margin-bottom: 12px;
    }
    .content-block-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--brand); margin-bottom: 10px;
    }
    .content-block-body {
      font-size: 14px; color: var(--text); line-height: 1.65;
      white-space: pre-wrap; word-break: break-word;
    }
    .content-block-body a {
      color: var(--brand); text-decoration: underline; word-break: break-all;
    }
    .content-block-empty { font-size: 14px; color: var(--text-light); font-style: italic; }

    /* ── Email PDF button ── */
    .pdf-btn-wrap { margin-bottom: 24px; }
    .pdf-btn {
      width: 100%; padding: 16px; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      border: 1.5px solid var(--brand); background: var(--card);
      color: var(--brand); transition: background 0.15s;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .pdf-btn:hover:not(:disabled) { background: var(--brand-light); }
    .pdf-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .pdf-btn-sub { font-size: 12px; font-weight: 400; color: var(--text-light); }

    /* ── States ── */
    .empty-state  { text-align: center; padding: 48px 16px; color: var(--text-light); font-size: 15px; }
    .loading-state { text-align: center; padding: 48px 16px; color: var(--text-light); font-size: 15px; }

    .error-banner {
      background: var(--error-bg); color: var(--error-text);
      border: 1px solid #FFCCCC; border-radius: 8px;
      padding: 12px 14px; font-size: 14px; margin-bottom: 12px; display: none;
    }
    .error-banner.visible { display: block; }

    .section-label {
      font-size: 12px; font-weight: 600; color: var(--text-light);
      text-transform: uppercase; letter-spacing: 0.5px; padding: 16px 4px 6px;
    }

    /* ── Supplement cards (history view) ── */
    .supp-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .supp-item:last-child { border-bottom: none; padding-bottom: 0; }
    .supp-item:first-child { padding-top: 0; }
    .supp-thumb { width: 44px; height: 56px; border-radius: 0; object-fit: cover; flex-shrink: 0; background: var(--brand-light); cursor: pointer; transition: opacity 0.15s; }
    .supp-thumb:hover { opacity: 0.82; }
    .supp-thumb-placeholder { width: 44px; height: 56px; background: var(--brand-light); }
    /* ── Supplement thumbnail hover preview ── */
    .supp-thumb-preview { position: fixed; z-index: 200; pointer-events: none; display: none; background: var(--card); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.18); padding: 4px; }
    .supp-thumb-preview img { display: block; width: 200px; height: auto; border-radius: 0; }
    .supp-info { flex: 1; min-width: 0; }
    .supp-title-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .supp-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .supp-link { color: var(--brand); text-decoration: none; }
    .supp-link:hover { text-decoration: underline; }
    .supp-meta { font-size: 12px; color: var(--text-light); margin-top: 2px; }
    .supp-badge { font-size: 11px; font-weight: 700; border-radius: 4px; padding: 1px 5px; white-space: nowrap; }
    .supp-badge-free { background: #F0FDF4; color: #16A34A; }
    .supp-badge-paid { background: var(--brand-light); color: var(--brand); }
    .supp-pool { font-size: 12px; color: var(--text-light); }

    /* ── Email recipient modal ── */
    .email-modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 200;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .email-modal-backdrop.hidden { display: none; }
    .email-modal {
      background: var(--card);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 28px 24px 32px;
      width: 100%; max-width: 640px;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.15);
    }
    .email-modal-heading {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem; color: var(--text);
      letter-spacing: -0.01em; margin-bottom: 10px;
    }
    .email-modal-body {
      font-size: 0.88rem; color: var(--text-mid);
      line-height: 1.6; margin-bottom: 4px;
    }
    .email-modal-body strong { color: var(--text); font-weight: 600; }
    .email-modal-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; margin-bottom: 20px; }
    .email-modal-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px;
    }
    .email-modal-row input[type="checkbox"] {
      width: 17px; height: 17px; accent-color: var(--brand);
      cursor: pointer; flex-shrink: 0;
    }
    .email-modal-row label {
      font-size: 0.85rem; color: var(--text);
      cursor: pointer; line-height: 1.4; word-break: break-all;
    }
    .email-modal-actions { display: flex; gap: 10px; }
    .email-modal-send {
      flex: 2; height: 50px;
      background: var(--brand); color: #fff;
      border: none; border-radius: var(--radius);
      font-family: 'DM Serif Display', serif;
      font-size: 1.05rem; cursor: pointer;
      box-shadow: 0 4px 16px rgba(219,110,43,0.28);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .email-modal-send:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(219,110,43,0.36); }
    .email-modal-send:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
    .email-modal-cancel {
      flex: 1; height: 50px;
      background: var(--card); color: var(--text-mid);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .email-modal-cancel:hover { border-color: var(--text-mid); color: var(--text); }
    .email-modal-cancel:disabled { opacity: 0.6; cursor: not-allowed; }
    .email-modal-error {
      font-size: 0.82rem; color: var(--danger);
      margin-top: 12px; display: none; line-height: 1.5;
    }
  </style>
</head>
<body>

<header class="header">
  <button class="header-back" id="backBtn" aria-label="Back">&#8592;</button>
  <span class="header-title" id="headerTitle">Lesson History</span>
  <button class="header-menu" id="menuBtn" aria-label="Main Menu">Main Menu</button>
</header>

<main class="content">
  <div id="errorBanner" class="error-banner" role="alert"></div>

  <!-- VIEW 1: Student selector -->
  <div id="viewStudents">
    <div class="toolbar">
      <label>
        <input type="checkbox" id="activeOnlyCheck" checked />
        Active students only
      </label>
    </div>
    <div class="card-list" id="studentList">
      <div class="loading-state">Loading students...</div>
    </div>
  </div>

  <!-- VIEW 2: Session list -->
  <div id="viewSessions" style="display:none;">
    <div class="card-list" id="sessionList">
      <div class="loading-state">Loading lessons...</div>
    </div>
  </div>

  <!-- VIEW 3: Session detail -->
  <div id="viewDetail" style="display:none;">
    <div id="detailContent"></div>
  </div>

</main>

  <!-- Email recipient modal -->
  <div id="emailModal" class="email-modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="email-modal-heading">
    <div class="email-modal">
      <div class="email-modal-heading" id="email-modal-heading">Email the practice plan?</div>
      <div class="email-modal-body" id="email-modal-body">
        <!-- Populated by JS -->
      </div>
      <div class="email-modal-actions">
        <button class="email-modal-send" id="emailModalSendBtn" onclick="confirmSendPdf()">Yes, Send</button>
        <button class="email-modal-cancel" id="emailModalCancelBtn" onclick="closeEmailModal()">Cancel</button>
      </div>
      <div class="email-modal-error" id="email-modal-error"></div>
    </div>
  </div>

<script type="module">
  import { supabase, requireAuth } from '/assets/app.js';

  await requireAuth();

  const teacherId = sessionStorage.getItem('teacher_id');

  // ── State ─────────────────────────────────────────────────────────────
  let allStudents     = [];
  let selectedStudent = null;           // { student_id, safe_name }
  let sessionRows     = [];             // cached session list for current student
  let currentSession  = null;           // full session record shown in detail view
  let view            = 'students';     // 'students' | 'sessions' | 'detail'
  let studentEmailData = null;          // cached email/unsub fields for modal

  // ── DOM refs ──────────────────────────────────────────────────────────
  const viewStudents    = document.getElementById('viewStudents');
  const viewSessions    = document.getElementById('viewSessions');
  const viewDetail      = document.getElementById('viewDetail');
  const studentList     = document.getElementById('studentList');
  const sessionList     = document.getElementById('sessionList');
  const detailContent   = document.getElementById('detailContent');
  const activeOnlyCheck = document.getElementById('activeOnlyCheck');
  const headerTitle     = document.getElementById('headerTitle');
  const backBtn         = document.getElementById('backBtn');
  const menuBtn         = document.getElementById('menuBtn');
  const errorBanner     = document.getElementById('errorBanner');

  function showErr(msg) { errorBanner.textContent = msg; errorBanner.classList.add('visible'); }
  function clearErr()   { errorBanner.textContent = '';  errorBanner.classList.remove('visible'); }

  menuBtn.addEventListener('click', () => { window.location.href = '/main_menu.html'; });

  // ── Back button -- three-level navigation ─────────────────────────────
  backBtn.addEventListener('click', () => {
    if (view === 'detail') {
      // Detail -> session list
      view = 'sessions';
      headerTitle.textContent = selectedStudent.safe_name + ' -- Lessons';
      viewDetail.style.display  = 'none';
      viewSessions.style.display = '';
      menuBtn.style.display = 'inline-block';
      clearErr();
    } else if (view === 'sessions') {
      // Session list -> student selector
      view = 'students';
      selectedStudent = null;
      sessionRows = [];
      headerTitle.textContent = 'Lesson History';
      viewSessions.style.display = 'none';
      viewStudents.style.display  = '';
      menuBtn.style.display = 'none';
      clearErr();
    } else {
      window.location.href = '/main_menu.html';
    }
  });

  // ── STUDENTS ──────────────────────────────────────────────────────────
  async function loadStudents() {
    studentList.innerHTML = '<div class="loading-state">Loading students...</div>';
    clearErr();

    const { data, error } = await supabase
      .from('students')
      .select('student_id, safe_name, student_status')
      .eq('teacher_id', teacherId)
      .not('student_status', 'in', '("archived","deleted")')
      .order('student_status', { ascending: true })
      .order('safe_name',      { ascending: true });

    if (error) { showErr('Could not load students. Please try again.'); studentList.innerHTML = ''; return; }

    allStudents = data || [];
    renderStudents();
  }

  function renderStudents() {
    const activeOnly = activeOnlyCheck.checked;
    const filtered   = activeOnly ? allStudents.filter(s => s.student_status === 'active') : allStudents;

    if (filtered.length === 0) {
      studentList.innerHTML = '<div class="empty-state">' + (activeOnly ? 'No active students.' : 'No students found.') + '</div>';
      return;
    }

    const active  = filtered.filter(s => s.student_status === 'active');
    const retired = filtered.filter(s => s.student_status !== 'active');
    let html = '';
    active.forEach(s  => { html += studentRowHTML(s, false); });
    if (retired.length > 0) {
      html += '<div class="section-label">Retired</div>';
      retired.forEach(s => { html += studentRowHTML(s, true); });
    }
    studentList.innerHTML = html;
    studentList.querySelectorAll('.student-row').forEach(el => {
      el.addEventListener('click', () => {
        const s = allStudents.find(x => x.student_id === el.dataset.studentId);
        if (s) openStudent(s);
      });
    });
  }

  function studentRowHTML(s, retired) {
    return '<div class="student-row' + (retired ? ' retired' : '') +
      '" data-student-id="' + s.student_id + '" role="button" tabindex="0">' +
      '<span class="student-name">' + escHtml(s.safe_name) + '</span>' +
      '<span class="chevron">&#8250;</span></div>';
  }

  activeOnlyCheck.addEventListener('change', renderStudents);

  function openStudent(student) {
    view = 'sessions';
    selectedStudent = student;
    headerTitle.textContent = student.safe_name + ' -- Lessons';
    viewStudents.style.display = 'none';
    viewSessions.style.display  = '';
    menuBtn.style.display = 'inline-block';
    clearErr();
    loadSessions(student.student_id);
  }

  // ── SESSIONS ──────────────────────────────────────────────────────────
  async function loadSessions(studentId) {
    sessionList.innerHTML = '<div class="loading-state">Loading lessons...</div>';

    const { data: sessions, error: sessErr } = await supabase
      .from('sessions')
      .select('session_id, session_date, max_lesson_page, pdf_sent_at, pdf_sent_to, lesson_book_id')
      .eq('teacher_id', teacherId)
      .eq('student_id', studentId)
      .eq('session_status', 'approved')
      .order('session_date', { ascending: false });

    if (sessErr) { showErr('Could not load lessons. Please try again.'); sessionList.innerHTML = ''; return; }

    const rows = sessions || [];

    // Fetch book names for all unique book IDs
    const bookIds = [...new Set(rows.map(s => s.lesson_book_id).filter(Boolean))];
    const bookMap = {};
    if (bookIds.length > 0) {
      const { data: books } = await supabase
        .from('books')
        .select('book_id, full_display_name')
        .in('book_id', bookIds);
      (books || []).forEach(b => { bookMap[b.book_id] = b.full_display_name; });
    }

    rows.forEach(s => {
      s.bookName = s.lesson_book_id ? (bookMap[s.lesson_book_id] || 'Unknown book') : 'Book not recorded';
    });

    sessionRows = rows; // cache for detail view -- avoids re-fetch
    renderSessions(rows);
  }

  function renderSessions(sessions) {
    if (sessions.length === 0) {
      sessionList.innerHTML = '<div class="empty-state">No completed lessons yet for ' + escHtml(selectedStudent.safe_name) + '.</div>';
      return;
    }

    let html = '';
    sessions.forEach(s => {
      const pdfLine = s.pdf_sent_at ? '<div class="pdf-sent-badge">&#10003; PDF sent ' + formatDate(s.pdf_sent_at) + '</div>' : '';
      html += '<div class="session-row" data-session-id="' + s.session_id + '" role="button" tabindex="0">' +
        '<div class="session-info">' +
        '<div class="session-date">' + escHtml(formatDate(s.session_date)) + '</div>' +
        '<div class="session-book">' + escHtml(s.bookName) + '</div>' +
        '<div class="session-page">' + escHtml(s.max_lesson_page ? 'Page ' + s.max_lesson_page : 'Page not recorded') + '</div>' +
        pdfLine + '</div><span class="chevron">&#8250;</span></div>';
    });

    sessionList.innerHTML = html;

    sessionList.querySelectorAll('.session-row').forEach(el => {
      el.addEventListener('click', () => { openDetail(el.dataset.sessionId); });
    });
  }

  // ── DETAIL ────────────────────────────────────────────────────────────
  async function openDetail(sessionId) {
    view = 'detail';
    headerTitle.textContent = selectedStudent.safe_name;
    viewSessions.style.display = 'none';
    viewDetail.style.display   = '';
    menuBtn.style.display = 'inline-block';
    detailContent.innerHTML    = '<div class="loading-state">Loading lesson...</div>';
    clearErr();

    // Fetch full session record -- content fields not loaded in list view
    const { data: session, error } = await supabase
      .from('sessions')
      .select('session_id, student_id, session_date, max_lesson_page, lesson_book_id, ai_summ_teacher, ai_summ_student, ai_summ_supplement_data, active_assignments_data, pdf_sent_at, pdf_sent_to')
      .eq('session_id', sessionId)
      .single();

    if (error || !session) {
      detailContent.innerHTML = '<div class="empty-state">Could not load lesson detail. Please go back and try again.</div>';
      return;
    }

    // Book name: use cached value if available, else fall back to lesson_book_id lookup
    const cached = sessionRows.find(s => s.session_id === sessionId);
    let bookName = cached ? cached.bookName : 'Unknown book';

    currentSession = session;
    renderDetail(session, bookName);

    // Wire the PDF button now that the DOM is rendered
    const pdfBtn = document.getElementById('pdfBtn');
    if (pdfBtn) {
      pdfBtn.disabled = false;
      pdfBtn.addEventListener('click', () => sendPdf());
    }
  }

  function renderDetail(s, bookName) {
    const pageStr    = s.max_lesson_page ? 'Page ' + s.max_lesson_page : 'Page not recorded';
    const dateStr    = formatDate(s.session_date);
    const hasPdfSent = !!s.pdf_sent_at;
    const pdfBtnLabel = hasPdfSent ? 'Resend Practice Plan' : 'Email Practice Plan';
    const pdfBtnSub   = hasPdfSent
      ? 'Last sent ' + formatDate(s.pdf_sent_at) + ' to ' + escHtml(s.pdf_sent_to || '')
      : '';

    detailContent.innerHTML =
      // Header block
      '<div class="detail-header">' +
        '<div class="detail-student">' + escHtml(selectedStudent.safe_name) + '</div>' +
        '<div class="detail-meta">' +
          escHtml(dateStr) + '<br>' +
          escHtml(bookName) + '<br>' +
          escHtml(pageStr) +
        '</div>' +
      '</div>' +

      // Teacher Summary
      contentBlockWithActiveSupps('Teacher Summary', s.ai_summ_teacher, s.active_assignments_data) +

      // Student Practice Plan
      contentBlockWithActiveSupps('Student Practice Plan', s.ai_summ_student, s.active_assignments_data) +

      // Recommended Supplements -- top 3 rich cards from ai_summ_supplement_data
      supplementBlock(s.ai_summ_supplement_data) +

      // Email PDF button
      '<div class="pdf-btn-wrap">' +
        '<button class="pdf-btn" id="pdfBtn">' +
          escHtml(pdfBtnLabel) +
          (pdfBtnSub ? '<span class="pdf-btn-sub">' + escHtml(pdfBtnSub) + '</span>' : '') +
        '</button>' +
      '</div>';
  }

  function contentBlock(label, text, renderLinks) {
    const isEmpty = !text || text.trim() === '';
    const body    = isEmpty
      ? '<div class="content-block-empty">Not recorded.</div>'
      : '<div class="content-block-body">' + (renderLinks ? markdownLinks(escHtml(text)) : escHtml(text)) + '</div>';
    return '<div class="content-block">' +
      '<div class="content-block-label">' + label + '</div>' +
      body +
      '</div>';
  }

  function contentBlockWithActiveSupps(label, text, assignments) {
    const isEmpty = !text || text.trim() === '';
    const body = isEmpty
      ? '<div class="content-block-empty">Not recorded.</div>'
      : '<div class="content-block-body">' + escHtml(text) + '</div>';

    const activeItems = (assignments || []);
    let activeHtml = '';
    if (activeItems.length > 0) {
      const cards = activeItems.map(a => {
        const thumb = a.thumbnail_url
          ? '<img class="supp-thumb" src="' + escHtml(a.thumbnail_url) + '" alt="" loading="lazy" data-url="' + escHtml(a.source_url || '') + '">'
          : '<div class="supp-thumb supp-thumb-placeholder"></div>';
        const titleEl = a.source_url
          ? '<a class="supp-title supp-link" href="' + escHtml(a.source_url) + '" target="_blank" rel="noopener noreferrer">' + escHtml(a.title || 'Untitled') + '</a>'
          : '<span class="supp-title">' + escHtml(a.title || 'Untitled') + '</span>';
        return '<div class="supp-item">' + thumb +
          '<div class="supp-info">' +
            '<div class="supp-title-row">' + titleEl + '</div>' +
          '</div></div>';
      }).join('');
      activeHtml =
        '<div class="content-block-label" style="margin-top:16px;">Active Supplements</div>' +
        cards;
    }

    return '<div class="content-block">' +
      '<div class="content-block-label">' + label + '</div>' +
      body +
      activeHtml +
      '</div>';
  }

  // Render top 3 supplement cards from ai_summ_supplement_data JSONB array
  function supplementBlock(data) {
    const items = (data || []).slice(0, 3);
    if (items.length === 0) {
      return '<div class="content-block">' +
        '<div class="content-block-label">Recommended Supplements</div>' +
        '<div class="content-block-empty">No supplements recorded.</div>' +
        '</div>';
    }
    const cards = items.map(s => {
      const thumb = s.thumbnail_url
        ? '<img class="supp-thumb" src="' + escHtml(s.thumbnail_url) + '" alt="" loading="lazy" data-url="' + escHtml(s.source_url || '') + '">'
        : '<div class="supp-thumb supp-thumb-placeholder"></div>';
      const badge = s.is_free === true
        ? '<span class="supp-badge supp-badge-free">Free</span>'
        : s.is_free === false
          ? '<span class="supp-badge supp-badge-paid">Resource</span>'
          : '';
      const pool = s.pool === 'fallback'
        ? '<span class="supp-pool">General resource</span>' : '';
      const titleEl = s.source_url
        ? '<a class="supp-title supp-link" href="' + escHtml(s.source_url) + '" target="_blank" rel="noopener noreferrer">' + escHtml(s.title || 'Untitled') + '</a>'
        : '<span class="supp-title">' + escHtml(s.title || 'Untitled') + '</span>';
      return '<div class="supp-item">' + thumb +
        '<div class="supp-info">' +
          '<div class="supp-title-row">' + titleEl + badge + '</div>' +
          (pool ? '<div class="supp-meta">' + pool + '</div>' : '') +
        '</div></div>';
    }).join('');
    return '<div class="content-block">' +
      '<div class="content-block-label">Recommended Supplements</div>' +
      cards +
      '</div>';
  }

  // ── Send PDF ──────────────────────────────────────────────────────────────
  async function sendPdf() {
    const pdfBtn = document.getElementById('pdfBtn');
    if (!pdfBtn || !currentSession) return;

    // Disable button while fetching email data
    pdfBtn.disabled = true;
    const originalHTML = pdfBtn.innerHTML;
    pdfBtn.innerHTML = 'Loading...';

    try {
      const { data: stu, error: stuErr } = await supabase
        .from('students')
        .select('email_primary, email_primary_unsubscribed, email_secondary, email_secondary_unsubscribed, email_tertiary, email_tertiary_unsubscribed')
        .eq('student_id', currentSession.student_id)
        .single();

      if (stuErr || !stu) throw new Error('Could not load student email information.');
      studentEmailData = stu;
    } catch (e) {
      pdfBtn.innerHTML = originalHTML;
      pdfBtn.disabled = false;
      showErr(e.message || 'Could not load student email information.');
      return;
    }

    // Restore button -- modal takes over from here
    pdfBtn.innerHTML = originalHTML;
    pdfBtn.disabled = false;
    openEmailModal();
  }

  // ── Email modal ───────────────────────────────────────────────────────────
  function openEmailModal() {
    const d = studentEmailData;
    const candidates = [
      { id: 'hist-email-primary',   addr: d.email_primary   || '', unsub: d.email_primary_unsubscribed   || false },
      { id: 'hist-email-secondary', addr: d.email_secondary || '', unsub: d.email_secondary_unsubscribed || false },
      { id: 'hist-email-tertiary',  addr: d.email_tertiary  || '', unsub: d.email_tertiary_unsubscribed  || false },
    ].filter(e => e.addr.trim() !== '');

    const listHtml = candidates.map(e =>
      '<div class="email-modal-row">' +
        '<input type="checkbox" id="' + e.id + '" ' + (e.unsub ? '' : 'checked') + ' onchange="updateEmailSendBtn()" />' +
        '<label for="' + e.id + '">' + escHtml(e.addr) + '</label>' +
      '</div>'
    ).join('');

    document.getElementById('email-modal-body').innerHTML =
      '<span>Select recipients for <strong>' + escHtml(selectedStudent.safe_name) + '</strong>\'s practice plan:</span>' +
      '<div class="email-modal-list">' + listHtml + '</div>';

    document.getElementById('email-modal-error').style.display = 'none';
    updateEmailSendBtn();
    document.getElementById('emailModal').classList.remove('hidden');
  }

  window.updateEmailSendBtn = function() {
    const anyChecked = ['hist-email-primary', 'hist-email-secondary', 'hist-email-tertiary']
      .some(id => { const el = document.getElementById(id); return el && el.checked; });
    document.getElementById('emailModalSendBtn').disabled = !anyChecked;
  };

  window.closeEmailModal = function() {
    document.getElementById('emailModal').classList.add('hidden');
  };

  window.confirmSendPdf = async function() {
    const sendBtn   = document.getElementById('emailModalSendBtn');
    const cancelBtn = document.getElementById('emailModalCancelBtn');
    const errEl     = document.getElementById('email-modal-error');

    // Collect checked addresses
    const toEmails = ['hist-email-primary', 'hist-email-secondary', 'hist-email-tertiary']
      .map(id => {
        const el = document.getElementById(id);
        return (el && el.checked) ? el.nextElementSibling.textContent.trim() : null;
      })
      .filter(Boolean);

    sendBtn.disabled   = true;
    cancelBtn.disabled = true;
    sendBtn.textContent = 'Sending…';
    errEl.style.display = 'none';

    const { data, error } = await supabase.functions.invoke('generate-session-pdf', {
      body: {
        session_id: currentSession.session_id,
        teacher_id: teacherId,
        send_type:  'manual',
        to_emails:  toEmails,
      },
    });

    if (error || !data?.success) {
      const msg = data?.error || error?.message || 'Email failed. Please try again.';
      errEl.textContent   = msg;
      errEl.style.display = 'block';
      sendBtn.disabled    = false;
      cancelBtn.disabled  = false;
      sendBtn.textContent = 'Yes, Send';
      return;
    }

    // Success -- close modal, update button and session state
    closeEmailModal();

    const sentTo = (data.sent_to || []).join(', ');
    const nowStr  = new Date().toISOString();
    currentSession.pdf_sent_at = nowStr;
    currentSession.pdf_sent_to = sentTo;

    const pdfBtn = document.getElementById('pdfBtn');
    if (pdfBtn) {
      pdfBtn.innerHTML = 'Resend Practice Plan' +
        '<span class="pdf-btn-sub">Last sent ' + formatDate(nowStr) + ' to ' + escHtml(sentTo) + '</span>';
      pdfBtn.disabled = false;
    }

    // Update session list row pdf badge so it reflects on back navigation
    const listRow = sessionRows.find(s => s.session_id === currentSession.session_id);
    if (listRow) { listRow.pdf_sent_at = nowStr; listRow.pdf_sent_to = sentTo; }

    // Brief sent confirmation
    const wrap = pdfBtn && pdfBtn.closest('.pdf-btn-wrap');
    if (wrap) {
      const confirm = document.createElement('div');
      confirm.style.cssText = 'text-align:center;color:#2E7D32;font-size:13px;font-weight:600;margin-top:6px;';
      confirm.textContent = 'Sent!';
      wrap.appendChild(confirm);
      setTimeout(() => confirm.remove(), 2000);
    }

    clearErr();
  };

  // ── Utilities ─────────────────────────────────────────────────────────
  function formatDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-CA', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadStudents();

  // ── Supplement thumbnail hover preview & click ────────────────────
  (function() {
    const preview = document.createElement('div');
    preview.className = 'supp-thumb-preview';
    const previewImg = document.createElement('img');
    preview.appendChild(previewImg);
    document.body.appendChild(preview);

    document.addEventListener('mouseover', function(e) {
      const thumb = e.target.closest('img.supp-thumb');
      if (!thumb || !thumb.src) return;
      previewImg.src = thumb.src;
      preview.style.display = 'block';
    });
    document.addEventListener('mousemove', function(e) {
      if (preview.style.display === 'none') return;
      preview.style.left = (e.clientX + 14) + 'px';
      preview.style.top  = (e.clientY - 10) + 'px';
    });
    document.addEventListener('mouseout', function(e) {
      if (!e.target.closest('img.supp-thumb')) return;
      preview.style.display = 'none';
    });
    document.addEventListener('click', function(e) {
      const thumb = e.target.closest('img.supp-thumb');
      if (!thumb) return;
      const url = thumb.dataset.url;
      if (url) window.open(url, '_blank', 'noopener');
    });
  })();
</script>
